<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>総合展2026 AIガイド</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;background:#f5f5f3}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;display:flex;justify-content:center}
.app{width:100%;max-width:430px;background:#fff;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.hdr{padding:14px 16px 12px;background:#0F6E56;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr .ttl{font-size:15px;font-weight:600;color:#fff}
.hdr .sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px}
.lang-sw{display:flex;gap:3px}
.lb{padding:4px 9px;font-size:11px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-weight:500}
.lb.on{background:#fff;color:#0F6E56;border-color:#fff}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.home-hero{padding:20px 16px 6px}
.home-hero h2{font-size:22px;font-weight:600;color:#1a1a18}
.home-hero p{font-size:14px;color:#73726c;margin-top:4px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px 0}
.cc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative}
.cc:active{background:#f5f5f3;transform:scale(.97)}
.cc.mc{border-color:#BA7517;background:#FFFBF2}
.cc-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cc-label{font-size:15px;font-weight:600;color:#1a1a18;line-height:1.3}
.cc-sub{font-size:11px;color:#888780;margin-top:3px}
.cc-arr{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#BA7517;font-size:16px}
.sub-hero{padding:16px 16px 8px}
.sub-hero h2{font-size:19px;font-weight:600;color:#1a1a18}
.sub-hero p{font-size:13px;color:#73726c;margin-top:3px}
.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 16px 16px}
.sc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
.sc:active{background:#f5f5f3;transform:scale(.97)}
.sc-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
.sc-label{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.3}
.sc-cnt{font-size:11px;color:#888780;margin-top:1px}
.mic-area{padding:20px 16px 10px;display:flex;flex-direction:column;align-items:center;gap:10px}
.mic-big{width:80px;height:80px;border-radius:50%;border:none;background:#0F6E56;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:32px;-webkit-tap-highlight-color:transparent}
.mic-big:active{opacity:.85;transform:scale(.96)}
.mic-big.rec{background:#E24B4A}
.mic-lbl{font-size:14px;color:#73726c}
.or-row{display:flex;align-items:center;gap:10px;padding:0 16px}
.or-line{flex:1;height:1px;background:#e8e7e1}
.or-txt{font-size:12px;color:#888780}
.txt-row{display:flex;gap:8px;padding:12px 16px 24px}
.txt-inp{flex:1;padding:13px 16px;font-size:16px;border:1.5px solid #d3d1c7;border-radius:14px;background:#fff;color:#1a1a18;outline:none;-webkit-appearance:none}
.txt-inp:focus{border-color:#0F6E56}
.snd-btn{width:50px;height:50px;border-radius:50%;border:none;background:#0F6E56;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0}
.ld-screen{padding:60px 16px;display:flex;flex-direction:column;align-items:center;gap:16px}
.dots{display:flex;gap:7px}
.dot{width:10px;height:10px;border-radius:50%;background:#0F6E56;animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.ld-txt{font-size:16px;color:#73726c}
.res-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e7e1;background:#fff;position:sticky;top:0;z-index:10}
.back-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid #d3d1c7;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#444441;font-size:20px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.back-btn:active{background:#f5f5f3}
.res-q{font-size:15px;font-weight:600;color:#1a1a18;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-cnt{font-size:12px;color:#73726c;white-space:nowrap}
.res-msg{padding:14px 16px 6px;font-size:14px;color:#5F5E5A;line-height:1.7}
.rcards{padding:8px 16px 14px;display:flex;flex-direction:column;gap:10px}
.rc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.rc-booth{width:72px;height:72px;border-radius:12px;background:#FAEEDA;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.rc-bnum{font-size:20px;font-weight:700;color:#854F0B;line-height:1}
.rc-blbl{font-size:10px;color:#BA7517;margin-top:4px}
.rc-co{font-size:16px;font-weight:600;color:#1a1a18;line-height:1.3}
.rc-prod{font-size:13px;color:#73726c;margin-top:5px;line-height:1.4}
.map-sec{margin:0 16px 16px;border:1px solid #e8e7e1;border-radius:14px;overflow:hidden}
.map-hdr{padding:9px 13px;border-bottom:1px solid #e8e7e1;font-size:12px;color:#73726c;display:flex;align-items:center;gap:5px;background:#f9f9f7}
.map-jump-btn{padding:5px 10px;background:#E1F5EE;color:#0F6E56;border:1px solid #0F6E56;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.map-all-btn{display:block;width:calc(100% - 32px);margin:0 16px 16px;padding:13px;background:#0F6E56;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.map-all-btn:active{opacity:.85}
.rc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.no-res{padding:48px 16px;text-align:center}
.no-res i{font-size:44px;color:#b4b2a9}
.no-res h3{font-size:19px;font-weight:600;color:#1a1a18;margin:14px 0 7px}
.no-res p{font-size:14px;color:#73726c;line-height:1.7}
/* アンケート */
.survey-wrap{padding:20px 16px}
.survey-title{font-size:18px;font-weight:600;color:#1a1a18;margin-bottom:6px}
.survey-sub{font-size:14px;color:#73726c;margin-bottom:20px}
.rating-row{display:flex;justify-content:space-around;margin-bottom:24px}
.rating-btn{width:72px;height:72px;border-radius:50%;border:2px solid #e8e7e1;background:#fff;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.rating-btn.on{border-color:#0F6E56;background:#E1F5EE}
.survey-q2{font-size:15px;font-weight:600;color:#1a1a18;margin-bottom:10px}
.booth-checks{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.bc{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #e8e7e1;border-radius:10px;cursor:pointer}
.bc.on{border-color:#0F6E56;background:#E1F5EE}
.bc-num{font-size:14px;font-weight:600;color:#854F0B;min-width:40px}
.bc-co{font-size:14px;color:#1a1a18}
.submit-btn{width:100%;padding:16px;background:#0F6E56;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px}
.submit-btn:active{opacity:.85}
/* 起動ローディング */
.init-screen{padding:80px 16px;display:flex;flex-direction:column;align-items:center;gap:16px}
.init-logo{font-size:48px;color:#0F6E56}
.init-txt{font-size:15px;color:#73726c}

/* === メインメニュー（4メニュー） === */
.main-menu{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px 16px 20px}
.mm-card{background:#fff;border:1px solid #e8e7e1;border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center;position:relative;min-height:140px;justify-content:center}
.mm-card:active{background:#f5f5f3;transform:scale(.97)}
.mm-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px}
.mm-label{font-size:16px;font-weight:600;color:#1a1a18;display:inline-flex;align-items:center;gap:6px}
.mm-sub{font-size:11px;color:#888780;margin-top:2px;line-height:1.4}
.menu-badge{background:#C8453E;color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}

/* === サブ画面ヘッダー === */
.sub-hd{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.back-btn{width:36px;height:36px;border-radius:50%;border:1px solid #e8e7e1;background:#fff;color:#1a1a18;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.back-btn:active{background:#f5f5f3}
.sub-hd-ttl{font-size:18px;font-weight:600;color:#1a1a18;flex:1}
.sub-hd-cnt{font-size:13px;font-weight:400;color:#888780;margin-left:6px}

/* === マイメモ === */
.memo-empty{padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center}
.me-icon{font-size:64px;color:#d4d2c8}
.me-ttl{font-size:17px;font-weight:600;color:#73726c}
.me-msg{font-size:13px;color:#888780;line-height:1.6}
.memo-list{padding:8px 16px}
.ml-card{background:#fff;border:1px solid #e8e7e1;border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid #534AB7}
.ml-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ml-booth{background:#EEEDFE;color:#534AB7;font-weight:700;padding:4px 10px;border-radius:8px;font-size:13px}
.ml-company{font-size:14px;font-weight:600;color:#1a1a18}
.ml-memo{font-size:13px;color:#1a1a18;line-height:1.6;background:#f5f5f3;padding:10px;border-radius:8px;white-space:pre-wrap;word-break:break-word}
.ml-memo-empty{color:#888780;font-style:italic}
.ml-actions{display:flex;gap:8px;margin-top:10px}
.ml-btn{flex:1;background:#fff;border:1px solid #e8e7e1;color:#1a1a18;font-size:12px;padding:8px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;-webkit-tap-highlight-color:transparent}
.ml-btn:active{background:#f5f5f3}
.ml-btn-del{color:#C8453E;border-color:#FAECE7}

.memo-mail{padding:14px 16px 30px;text-align:center}
.mail-btn{background:#0F6E56;color:#fff;border:none;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent}
.mail-btn:active{opacity:.85}
.mail-note{font-size:11px;color:#888780;margin-top:8px}

/* === メモ編集モーダル === */
.memo-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.memo-modal{background:#fff;width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:18px;animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(20px)}to{transform:translateY(0)}}
.mm-hd{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:600;color:#1a1a18;margin-bottom:14px;position:relative}
.mm-close{position:absolute;right:0;top:-4px;background:none;border:none;color:#888780;cursor:pointer;font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.mm-booth-info{background:#f5f5f3;border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.mm-booth{background:#534AB7;color:#fff;font-weight:700;padding:4px 10px;border-radius:8px;font-size:13px}
.mm-company{font-size:14px;font-weight:600;color:#1a1a18;flex:1}
.mm-textarea{width:100%;border:1px solid #e8e7e1;border-radius:10px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;box-sizing:border-box;line-height:1.5}
.mm-textarea:focus{outline:none;border-color:#534AB7}
.mm-mic-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.mm-mic-btn{background:#fff;border:1px solid #534AB7;color:#534AB7;font-size:12px;padding:8px 14px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent}
.mm-mic-btn.mic-on{background:#E24B4A;color:#fff;border-color:#E24B4A;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.mm-note{font-size:11px;color:#888780;flex:1;min-width:160px}
.mm-actions{display:flex;gap:10px;margin-top:14px}
.mm-btn{flex:1;border:none;padding:13px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mm-btn-cancel{background:#f5f5f3;color:#73726c}
.mm-btn-save{background:#534AB7;color:#fff}
.mm-btn-save:active{opacity:.85}
.mm-btn-save:disabled{background:#d3d1c7;cursor:not-allowed}
.mm-section-label{font-size:13px;font-weight:600;color:#1a1a18;margin-bottom:8px;margin-top:4px}
.mm-textarea-wrap{position:relative}
.mm-textarea-wrap .mm-textarea{padding-right:42px}
.mm-mic-icon{position:absolute;right:8px;bottom:8px;width:32px;height:32px;border-radius:50%;border:none;background:#f5f5f3;color:#73726c;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;-webkit-tap-highlight-color:transparent}
.mm-mic-icon:active{opacity:.85}
.mm-mic-icon.mic-on{background:#E24B4A;color:#fff;animation:micPulse 1s ease-in-out infinite}
.my-other-inq-btn{margin-left:auto;background:#fff;border:1.5px solid #C8842F;color:#C8842F;padding:7px 12px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.my-other-inq-btn:active{background:#fdf6ec}
.my-other-inq-btn i{font-size:14px}
@media (max-width:380px){.my-other-inq-label{display:none}}
.my-search-add-btn{width:100%;background:#f5f5f3;border:1.5px dashed #b8b5a8;color:#534AB7;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent}
.my-search-add-btn:active{background:#e8e7e1}
.my-search-add-btn i{font-size:16px}
.oinq-radio{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #e8e7e1;border-radius:8px;font-size:13px;color:#1a1a18;cursor:pointer;-webkit-tap-highlight-color:transparent}
.oinq-radio input{accent-color:#C8842F;width:16px;height:16px;margin:0}
.oinq-radio:has(input:checked){background:#fdf6ec;border-color:#C8842F}

/* === 検索結果カードのメモボタン === */
.rc-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.memo-btn{background:#fff;border:1px solid #e8e7e1;color:#534AB7;font-size:11px;padding:5px 10px;border-radius:14px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent}
.memo-btn:active{background:#f5f5f3}
.memo-btn-on{background:#534AB7;color:#fff;border-color:#534AB7}
.memo-btn-on:active{opacity:.85}

/* === AIコンシェルジュ準備中 === */
.ai-coming{padding:50px 24px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.ai-coming-icon{font-size:64px;color:#185FA5;background:#E6F1FB;width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ai-coming-ttl{font-size:18px;font-weight:600;color:#185FA5}
.ai-coming-msg{font-size:13px;color:#73726c;line-height:1.6}
.ai-coming-examples{margin-top:20px;display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px}
.aie{background:#f5f5f3;padding:10px 14px;border-radius:20px;font-size:13px;color:#73726c;text-align:left}

/* === セミナーvenueボタン === */
.venue-btn{background:#fff;border:1px solid #0F6E56;color:#0F6E56;font-size:12px;font-weight:600;padding:6px 12px;border-radius:16px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;margin-top:2px}
.venue-btn:active{background:#E1F5EE}

/* === 同意画面 === */
.consent-wrap{padding:0;display:flex;flex-direction:column}
.consent-hero{background:#fff;padding:40px 24px 32px;text-align:center;color:#1a1a18;border-bottom:1px solid #e8e7e1}
.consent-logo{font-size:56px;margin-bottom:12px}
.consent-ttl{font-size:22px;font-weight:700;margin-bottom:6px}
.consent-sub{font-size:13px;opacity:.85;line-height:1.5}
.consent-body{padding:16px 20px}
.consent-card{background:#f9f9f7;border-radius:14px;padding:16px;margin-bottom:16px}
.consent-card-ttl{font-size:13px;font-weight:700;color:#1a1a18;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.consent-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #e8e7e1;font-size:13px;color:#444441}
.consent-item:last-child{border-bottom:none}
.consent-item i{color:#0F6E56;flex-shrink:0;margin-top:1px;font-size:16px}
.consent-notice{font-size:11px;color:#888780;line-height:1.6;text-align:center;padding:0 8px 20px}
.consent-btns{padding:16px 20px calc(16px + env(safe-area-inset-bottom)) 20px;background:#fff;border-top:1px solid #e8e7e1}
.consent-ok{width:100%;padding:16px;background:#0F6E56;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:10px}
.consent-ok:active{opacity:.85}
.consent-skip{width:100%;padding:12px;background:none;border:none;color:#888780;font-size:13px;cursor:pointer}

/* === QRスキャン画面 === */
.qr-wrap{padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
.qr-icon{width:100px;height:100px;border-radius:24px;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:48px}
.qr-ttl{font-size:20px;font-weight:700;color:#1a1a18}
.qr-sub{font-size:13px;color:#73726c;line-height:1.6}
.qr-scan-area{width:220px;height:220px;border:3px solid #0F6E56;border-radius:18px;position:relative;background:#f0faf5;display:flex;align-items:center;justify-content:center;margin:8px 0}
.qr-corner{position:absolute;width:24px;height:24px;border-color:#0F6E56;border-style:solid}
.qr-corner.tl{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:4px 0 0 0}
.qr-corner.tr{top:-3px;right:-3px;border-width:4px 4px 0 0;border-radius:0 4px 0 0}
.qr-corner.bl{bottom:-3px;left:-3px;border-width:0 0 4px 4px;border-radius:0 0 0 4px}
.qr-corner.br{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 4px 0}
.qr-scan-line{position:absolute;width:80%;height:2px;background:linear-gradient(90deg,transparent,#0F6E56,transparent);animation:scanline 2s ease-in-out infinite}

// AI会話履歴
let aiHistory = [];  // [{role:'user'|'assistant', content:'...'}]

// 商品データ（GASから取得 or フォールバック）
let P = [];
let SEMINARS = [];
let VENUE_SVG_INNER = '';  // venue_map.svgの中身（fetchで取得）

// ============================================================
// 通路データ（ユーザー指定）
// ============================================================
const H_CORRIDORS = [
  {"y":366,"x1":11,"x2":528},
  {"y":723,"x1":13,"x2":477},
  {"y":676,"x1":14,"x2":476},
  {"y":511,"x1":108,"x2":453},
  {"y":443,"x1":108,"x2":452},
  {"y":525,"x1":452,"x2":528},
  {"y":88,"x1":40,"x2":524},
  {"y":240,"x1":42,"x2":120},
  {"y":198,"x1":118,"x2":282},
  {"y":129,"x1":118,"x2":282},
  {"y":158,"x1":282,"x2":452},
  {"y":289,"x1":283,"x2":451},
  {"y":266,"x1":118,"x2":282},
  {"y":494,"x1":39,"x2":108},
  {"y":214,"x1":449,"x2":524},
  {"y":578,"x1":39,"x2":474},
  {"y":627,"x1":39,"x2":474},
  {"y":644,"x1":474,"x2":528}
];
const V_CORRIDORS = [
  {"x":450,"y1":88,"y2":366},
  {"x":524,"y1":88,"y2":366},
  {"x":282,"y1":88,"y2":366},
  {"x":282,"y1":366,"y2":723},
  {"x":127,"y1":676,"y2":723},
  {"x":14,"y1":676,"y2":723},
  {"x":39,"y1":494,"y2":676},
  {"x":108,"y1":366,"y2":676},
  {"x":452,"y1":366,"y2":525},
  {"x":474,"y1":525,"y2":723},
  {"x":528,"y1":366,"y2":644},
  {"x":118,"y1":88,"y2":266},
  {"x":120,"y1":266,"y2":366},
  {"x":41,"y1":88,"y2":366}
];

// ============================================================
// 通路グラフ構築（起動時に1回）
// ============================================================
let CORRIDOR_GRAPH = null;
function buildCorridorGraph() {
  const nodes = []; // {x,y}
  const edges = []; // {a,b,d}
  function findOrAdd(x, y) {
    for(let i=0; i<nodes.length; i++) {
      if(Math.abs(nodes[i].x-x)<0.5 && Math.abs(nodes[i].y-y)<0.5) return i;
    }
    nodes.push({x:x, y:y});
    return nodes.length - 1;
  }

  // H通路ごとに端点+交差点をノード化、隣接エッジ
  H_CORRIDORS.forEach(function(h) {
    const pts = [{x:h.x1, y:h.y}, {x:h.x2, y:h.y}];
    V_CORRIDORS.forEach(function(v) {
      if(v.x >= h.x1 && v.x <= h.x2 && h.y >= v.y1 && h.y <= v.y2) {
        pts.push({x:v.x, y:h.y});
      }
    });
    pts.sort(function(a,b){return a.x-b.x;});
    let prev = -1;
    pts.forEach(function(p) {
      const id = findOrAdd(p.x, p.y);
      if(prev !== -1 && prev !== id) {
        edges.push({a:prev, b:id, d:Math.abs(nodes[id].x - nodes[prev].x)});
      }
      prev = id;
    });
  });

  // V通路も同様
  V_CORRIDORS.forEach(function(v) {
    const pts = [{x:v.x, y:v.y1}, {x:v.x, y:v.y2}];
    H_CORRIDORS.forEach(function(h) {
      if(v.x >= h.x1 && v.x <= h.x2 && h.y >= v.y1 && h.y <= v.y2) {
        pts.push({x:v.x, y:h.y});
      }
    });
    pts.sort(function(a,b){return a.y-b.y;});
    let prev = -1;
    pts.forEach(function(p) {
      const id = findOrAdd(p.x, p.y);
      if(prev !== -1 && prev !== id) {
        edges.push({a:prev, b:id, d:Math.abs(nodes[id].y - nodes[prev].y)});
      }
      prev = id;
    });
  });

  // 近接ノード自動接続（通路端点の僅かなズレを吸収。例:x=282/y2=721 と y=723通路）
  const TOL = 6;
  for(let i=0; i<nodes.length; i++) {
    for(let j=i+1; j<nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d = Math.hypot(dx, dy);
      if(d > 0 && d <= TOL) {
        edges.push({a:i, b:j, d:d});
      }
    }
  }
  return {nodes:nodes, edges:edges};
}

// ブース座標から最寄り通路点の候補リストを返す（上位n個）
function nearestCorridorPoints(bx, by, n) {
  n = n || 5;
  const cands = [];
  H_CORRIDORS.forEach(function(h, i) {
    let px;
    if(bx < h.x1) px = h.x1;
    else if(bx > h.x2) px = h.x2;
    else px = bx;
    cands.push({x:px, y:h.y, type:'h', idx:i, dist:Math.hypot(bx-px, by-h.y)});
  });
  V_CORRIDORS.forEach(function(v, i) {
    let py;
    if(by < v.y1) py = v.y1;
    else if(by > v.y2) py = v.y2;
    else py = by;
    cands.push({x:v.x, y:py, type:'v', idx:i, dist:Math.hypot(bx-v.x, by-py)});
  });
  cands.sort(function(a,b){ return a.dist - b.dist; });
  return cands.slice(0, n);
}

// 旧nearestCorridorPoint（残しておく：互換用）
function nearestCorridorPoint(bx, by) {
  const list = nearestCorridorPoints(bx, by, 1);
  return list[0];
}

// エントリーポイントをグラフに追加し、そのノードIDを返す
function insertEntryNode(graph, entry) {
  // 既存ノードに同座標があれば再利用
  for(let i=0; i<graph.nodes.length; i++) {
    if(Math.abs(graph.nodes[i].x-entry.x)<0.5 && Math.abs(graph.nodes[i].y-entry.y)<0.5) return i;
  }
  const newId = graph.nodes.length;
  graph.nodes.push({x:entry.x, y:entry.y});
  // 同じ通路上の全ノードと接続（後続のダイクストラで最短が選ばれる）
  if(entry.type === 'h') {
    const h = H_CORRIDORS[entry.idx];
    graph.nodes.forEach(function(n, i) {
      if(i === newId) return;
      if(Math.abs(n.y - h.y) < 0.5 && n.x >= h.x1 - 0.5 && n.x <= h.x2 + 0.5) {
        graph.edges.push({a:newId, b:i, d:Math.abs(entry.x - n.x)});
      }
    });
  } else {
    const v = V_CORRIDORS[entry.idx];
    graph.nodes.forEach(function(n, i) {
      if(i === newId) return;
      if(Math.abs(n.x - v.x) < 0.5 && n.y >= v.y1 - 0.5 && n.y <= v.y2 + 0.5) {
        graph.edges.push({a:newId, b:i, d:Math.abs(entry.y - n.y)});
      }
    });
  }
  return newId;
}

// ============================================================
// ダイクストラ最短経路
// ============================================================
function dijkstra(graph, start, end) {
  const n = graph.nodes.length;
  const dist = new Array(n).fill(Infinity);
  const prev = new Array(n).fill(-1);
  const visited = new Array(n).fill(false);
  const adj = new Array(n).fill(null).map(function(){return [];});
  graph.edges.forEach(function(e) {
    adj[e.a].push({to:e.b, w:e.d});
    adj[e.b].push({to:e.a, w:e.d});
  });
  dist[start] = 0;
  for(let i=0; i<n; i++) {
    let u = -1, mn = Infinity;
    for(let j=0; j<n; j++) {
      if(!visited[j] && dist[j] < mn) { mn = dist[j]; u = j; }
    }
    if(u === -1 || u === end) break;
    visited[u] = true;
    adj[u].forEach(function(e) {
      if(dist[u] + e.w < dist[e.to]) {
        dist[e.to] = dist[u] + e.w;
        prev[e.to] = u;
      }
    });
  }
  if(dist[end] === Infinity) return [];
  const path = [];
  for(let cur = end; cur !== -1; cur = prev[cur]) path.unshift(cur);
  return path;
}

// 経路探索メイン：ブースから「最寄りの通路」に直角に出て、そこから通路グラフで最短探索
function findCorridorRoute(from, to) {
  if(!CORRIDOR_GRAPH) return null;
  // それぞれ最寄りの通路点（1点のみ）→ ブース→通路を必ず通る
  const fEntry = nearestCorridorPoint(from.cx, from.cy);
  const tEntry = nearestCorridorPoint(to.cx, to.cy);
  if(!fEntry || !tEntry) return null;

  // グラフをコピー（エントリーノード追加用）
  const g = {
    nodes: CORRIDOR_GRAPH.nodes.map(function(n){return {x:n.x, y:n.y};}),
    edges: CORRIDOR_GRAPH.edges.slice()
  };
  const fId = insertEntryNode(g, fEntry);
  const tId = insertEntryNode(g, tEntry);
  const path = dijkstra(g, fId, tId);
  if(path.length === 0) return null;

  // ブース→通路点を「直角」にする（斜め線でブース壁を貫通するのを防ぐ）
  function rectifyEntry(boothXY, entry) {
    if(Math.abs(boothXY.x - entry.x) < 0.5 || Math.abs(boothXY.y - entry.y) < 0.5) {
      return [boothXY, {x:entry.x, y:entry.y}];
    }
    if(entry.type === 'h') {
      return [boothXY, {x:boothXY.x, y:entry.y}, {x:entry.x, y:entry.y}];
    } else {
      return [boothXY, {x:entry.x, y:boothXY.y}, {x:entry.x, y:entry.y}];
    }
  }
  const fromPart = rectifyEntry({x:from.cx, y:from.cy}, fEntry);
  const toPart = rectifyEntry({x:to.cx, y:to.cy}, tEntry).slice().reverse();
  const midPath = path.map(function(id){ return g.nodes[id]; });

  let points = [].concat(fromPart, midPath, toPart);
  // 連続する同座標を除去
  const clean = [points[0]];
  for(let i=1; i<points.length; i++) {
    const p = points[i], last = clean[clean.length-1];
    if(Math.abs(p.x-last.x)>0.5 || Math.abs(p.y-last.y)>0.5) clean.push(p);
  }
  // 経路の両端をブース円の手前(11px)で止める
  if(clean.length >= 2) {
    const p0 = clean[0], p1 = clean[1];
    const dx = p1.x - p0.x, dy = p1.y - p0.y, len = Math.hypot(dx, dy);
    if(len > 14) clean[0] = { x: p0.x + dx/len*11, y: p0.y + dy/len*11 };
    const pN = clean[clean.length-1], pN1 = clean[clean.length-2];
    const dx2 = pN1.x - pN.x, dy2 = pN1.y - pN.y, len2 = Math.hypot(dx2, dy2);
    if(len2 > 14) clean[clean.length-1] = { x: pN.x + dx2/len2*11, y: pN.y + dy2/len2*11 };
  }
  return 'M' + clean.map(function(p){return p.x+','+p.y;}).join(' L');
}

window.addEventListener('load', async () => {
  // 通路グラフ構築（即時）
  CORRIDOR_GRAPH = buildCorridorGraph();
  console.log('✅ 通路グラフ構築: ノード'+CORRIDOR_GRAPH.nodes.length+'個, エッジ'+CORRIDOR_GRAPH.edges.length+'本');

  // ローディング表示
  document.getElementById('screen').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#fafaf8">
      <div style="width:50px;height:50px;border:4px solid #e8e7e1;border-top-color:#0F6E56;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px"></div>
      <div style="color:#73726c;font-size:14px">出展社データを読み込み中…</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;

  // 会場SVG読込（並行）
  const svgPromise = fetch('venue_map.svg')
    .then(r => r.ok ? r.text() : '')
    .then(svgText => {
      const m = svgText.match(/<svg[^>]*>([\s\S]*)<\/svg>/);
      if(m) {
        VENUE_SVG_INNER = m[1];
        console.log('✅ 会場SVG読込完了');
      }
    })
    .catch(e => console.warn('会場SVG読込失敗:', e.message));

  // GASからデータ取得（完了を待つ・10秒タイムアウト）
  let gasOK = false;
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    const [prodRes, semRes] = await Promise.all([
      fetch(GAS_URL + '?action=products', {signal: ctrl.signal}),
      fetch(GAS_URL + '?action=seminar',  {signal: ctrl.signal}),
    ]);
    clearTimeout(timer);
    const prodData = await prodRes.json();
    const semData  = await semRes.json();
    if (prodData.products && prodData.products.length > 0) {
      P = prodData.products;
      gasOK = true;
      console.log('✅ GASデータ取得完了: ' + P.length + '社');
    }
    if (semData.seminars && semData.seminars.length > 0) {
      SEMINARS = semData.seminars;
    }
  } catch (e) {
    console.warn('GAS未接続。サンプルデータで動作。', e.message);
  }

  // GAS失敗時のみフォールバック
  if(!gasOK) {
    P = SAMPLE_P;
    SEMINARS = SAMPLE_SEMINARS;
  }

  // SVG読込も待つ
  await svgPromise;

  // Fuse.js初期化
  initFuse();

  // 起動フロー判定
  const params = new URLSearchParams(location.search);

  // ?reset=1 でlocalStorage・sessionStorageをクリアして同意画面から再スタート
  if (params.get('reset') === '1') {
    try { localStorage.clear(); } catch(e){}
    try { sessionStorage.clear(); } catch(e){}
    history.replaceState({}, '', location.pathname + (params.get('dev')==='1' ? '?dev=1' : ''));
    visitorGyotai = '';
    visitorQRCode = '';
    showConsentScreen();
    return;
  }

  // ?dev=1 で同意・QRをスキップ（開発用）
  if (params.get('dev') === '1') {
    visitorGyotai = 'パン製造業';
    visitorQRCode = 'dev';
    saveVisitor();
    showHome();
    return;
  }

  const hasConsent = localStorage.getItem(CONSENT_KEY) === '1';
  if (!hasConsent) {
    showConsentScreen();
  } else if (!visitorQRCode) {
    showQRScreen();
  } else {
    showHome();
  }
});

// QRスキャン画面（入場証読み取り）
// ============================================================
let qrScanner = null;

function showQRScreen() {
  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="qr-wrap">
      <div class="qr-icon">📷</div>
      <div class="qr-ttl">入場証のQRを読み取る</div>
      <div class="qr-sub">入場証（招待状）に印刷されたQRコードを<br>カメラでスキャンしてください</div>
      <div class="qr-scan-area" id="qrScanArea">
        <div class="qr-corner tl"></div><div class="qr-corner tr"></div>
        <div class="qr-corner bl"></div><div class="qr-corner br"></div>
        <div class="qr-scan-line"></div>
        <div id="qrReader" style="width:100%;height:100%;border-radius:14px;overflow:hidden"></div>
      </div>
      <div style="margin-top:8px">
        <button class="qr-skip" onclick="skipQR()">スキャンできない場合はスキップ</button>
      </div>
    </div>
  </div>`;

  // カメラQR読み取り（jsQR使用）
  startQRCamera();
}

function startQRCamera() {
  const video = document.createElement('video');
  video.setAttribute('playsinline', true);
  video.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:14px';
  const reader = document.getElementById('qrReader');
  if (!reader) return;
  reader.appendChild(video);

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  let scanning = true;

  navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
    .then(stream => {
      video.srcObject = stream;
      video.play();
      window._qrStream = stream;
      requestAnimationFrame(scanFrame);
    })
    .catch(() => {
      if (reader) reader.innerHTML = '<div style="color:#888780;font-size:13px;padding:20px;text-align:center">カメラが利用できません<br>スキップしてご入場ください</div>';
    });

  function scanFrame() {
    if (!scanning || !document.getElementById('qrReader')) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      // jsQRが利用可能なら使用
      if (typeof jsQR !== 'undefined') {
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
          scanning = false;
          stopQRCamera();
          processQRCode(code.data);
          return;
        }
      }
    }
    requestAnimationFrame(scanFrame);
  }
}

async function callOpenAI(userMsg) {
  // AIなしモードはデモレスポンスに即フォールバック
  if (!AI_ENABLED) return demoAIResponse(userMsg);

  // 出展社リスト：タグの先頭一致スコアで関連度を計算して渡す
  // 質問キーワードがタグの早い位置にある社ほど上位に表示される
  const qNormAI = userMsg.replace(/[\s　。、？！]+/g, '').toLowerCase();
  let contextBooths = [];
  if (qNormAI.length >= 2) {
    const scored = P.map(p => {
      const tags = p.tags || [];
      let score = 0;
      tags.forEach((tag, idx) => {
        const t = tag.toLowerCase();
        if (t === qNormAI) score += 100 - idx;         // 完全一致：タグ順で重み付け
        else if (t.includes(qNormAI)) score += 50 - idx; // 部分一致
        else if (qNormAI.includes(t) && t.length >= 2) score += 20 - idx; // 逆包含
      });
      return { p, score };
    });
    scored.sort((a, b) => b.score - a.score);
    contextBooths = scored.map(s => s.p).slice(0, 80);
  } else {
    contextBooths = P.slice(0, 80);
  }
  const boothContext = contextBooths.map(p =>
    `${p.booth} ${p.company}：${(p.tags||[]).slice(0,5).join('、')}`
  ).join('\n');

  const seminarsContext = SEMINARS.map(s =>
    `[${s.date} ${s.time}] ${s.title}（${s.venue}・${s.reservation}）`
  ).join('\n');

  const gyotaiCtx = GYOTAI_CONTEXT[visitorGyotai] || GYOTAI_CONTEXT[''];

  const systemPrompt = `あなたは「丸菱グループ 第37回食品機械と原材料 総合展2026」（6/10-11、マリンメッセ福岡A館）の来場者向けAIコンシェルジュです。

【来場者情報】
業態: ${visitorGyotai || '不明'}
${gyotaiCtx}

【会場の出展社（抜粋）】
${boothContext}

【セミナー・実演スケジュール】
${seminarsContext}

【施設情報】
- 出入口: 南側（A出口）
- 2Fセミナー会場: 階段で上がる
- 総合案内: 会場中央
- フードコーナー・ドリンクコーナー: 北側
- アウトレット市: 北西角
- 忘れ物・緊急連絡: 総合案内へ

【回答ルール】
1. 業態に合わせた専門的なアドバイスをする（${visitorGyotai || '全業態向け'}視点）
2. 出展社を案内する際は必ずブース番号を添える（例: ホシザキ C11）
3. 複数の関連出展社があれば最大5社提案する（多いほど出展社に公平）
4. 場所を聞かれたら「MAPで見る」ことを促す
5. 見積・詳細希望には丸菱営業担当への連携を提案する
6. 回答は簡潔に。200文字以内を目安にする
7. 日本語で回答する`;

  // ── GASプロキシ経由でOpenAI呼び出し（APIキーはGAS側スクリプトプロパティに保管）──
  const payload = {
    action: 'ai',
    messages: JSON.stringify([
      {role: 'system', content: systemPrompt},
      ...aiHistory.slice(-6),
    ]),
    gyotai:  visitorGyotai,
    session: SESSION_ID,
  };

  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: Object.entries(payload).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&'),
  });

  if (!res.ok) throw new Error('GAS proxy error: ' + res.status);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.reply || demoAIResponse(userMsg);
}

// デモ用応答（API Key未設定時）
function demoAIResponse(msg) {
  const m = msg.toLowerCase();
  // 出展社検索を代替
  if (P && P.length > 0) {
    const qNorm = msg.replace(/[　\s]/g,'').toLowerCase();
    // タグ先頭一致スコアで並び替えて最大5社
    const scored = P.map(p => {
      let score = 0;
      (p.tags||[]).forEach((tag, idx) => {
        const t = tag.toLowerCase();
        if (t === qNorm)            score += 100 - idx;
        else if (t.includes(qNorm)) score += 50 - idx;
        else if (qNorm.includes(t) && t.length >= 2) score += 20 - idx;
      });
      return { p, score };
    }).filter(s => s.score > 0).sort((a,b) => b.score - a.score);
    if (scored.length > 0) {
      const list = scored.slice(0,5).map(s => `• ${s.p.booth} ${s.p.company}`).join('\n');
      return `「${msg}」に関連する出展社をご案内します:\n${list}\n\n詳細はブース番号でMAPをご確認ください。`;
    }
  }
  if (/セミナー|実演/.test(m)) {
    const s = SEMINARS[0];
    return s ? `セミナーは${s.date} ${s.time}〜「${s.title}」（${s.venue}・${s.reservation}）などがございます。セミナータブで全スケジュールをご確認ください。` : 'セミナー情報はセミナー・実演タブをご確認ください。';
  }
  if (/忘れ|落とした|なくし/.test(m)) {
    return '忘れ物・遺失物は会場中央の**総合案内**までお申し出ください。スタッフが対応いたします。';
  }
  if (/トイレ|wc|お手洗い/.test(m)) {
    return 'お手洗いは会場の四隅（東西の出入口付近）にございます。会場MAPでご確認いただけます。';
  }
  return `「${msg}」についてお調べします。現在AIキーが未設定のためデモモードで動作しています。「ブースを探す」から検索もご利用ください。`;
}

function appendSearchShortcut(afterEl, userMsg) {
  if (!afterEl) return;
  // セミナー系・挨拶系はスキップ
  if (/セミナー|実演|スケジュール|時間|挨拶|こんにちは|ありがとう|場所.*ト|忘れ|トイレ/.test(userMsg)) return;

  // ユーザーのメッセージから核心キーワードを抽出
  // 「〜の場所を教えて」「〜はどこ」「〜を探してる」などの語尾・助詞を除去
  const q = userMsg
    .replace(/の場所(を|は|が)?(教えて|知りたい|わかる|教えてください)?/g, '')
    .replace(/を探して(いる|る|ほしい|います|ほしいです)?/g, '')
    .replace(/(は|が|を|に|で|の)?(どこ|どこに|どこへ|どこにある|どこにいる)/g, '')
    .replace(/について(教えて|知りたい|ください)?/g, '')
    .replace(/(教えて|ください|お願い|知りたい|わかる|ありますか|あります|ある\?|が欲しい)/g, '')
    .replace(/[？?！!。、　\s]+/g, ' ')
    .trim();

  if (!q || q.length < 2) return;

  const btn = document.createElement('button');
  btn.style.cssText = 'margin-top:8px;background:#E1F5EE;border:1px solid #0F6E56;color:#0F6E56;font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent';
  btn.innerHTML = '<i class="ti ti-search" style="font-size:13px"></i> 「' + escapeHtml(q) + '」でブース一覧を見る';
  btn.onclick = function() { search(q, q); };
  afterEl.closest('.ai-msg').appendChild(btn);
}

    showInquiryForm(booth, company, inquiryTxt);

  }

  closeMemoEditor();

  if (typeof currentSearchResults !== 'undefined' && currentSearchResults && currentSearchLabel) {
    showResults(currentSearchResults, currentSearchLabel);
  }
}

// メモ・問い合わせ用音声入力
let memoRecognition = null;
let memoListening = false;
let memoMicCurrentBtn = null;
function toggleMemoMic(targetId) {
  targetId = targetId || 'memoText';
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('このブラウザは音声入力に対応していません');
    return;
  }
  const btnId = targetId === 'inquiryText' ? 'inquiryMicBtn' : 'memoMicBtn';
  const btn = document.getElementById(btnId);
  if (memoListening) {
    if (memoRecognition) memoRecognition.stop();
    memoListening = false;
    if (memoMicCurrentBtn) {
      memoMicCurrentBtn.classList.remove('mic-on');
      memoMicCurrentBtn.innerHTML = '<i class="ti ti-microphone"></i>';
    }
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  memoRecognition = new SR();
  memoRecognition.lang = 'ja-JP';
  memoRecognition.continuous = false;
  memoRecognition.interimResults = false;
  memoRecognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    const ta = document.getElementById(targetId);
    if (ta) ta.value = ta.value ? ta.value + ' ' + txt : txt;
  };
  memoRecognition.onend = () => {
    memoListening = false;
    if (memoMicCurrentBtn) {
      memoMicCurrentBtn.classList.remove('mic-on');
      memoMicCurrentBtn.innerHTML = '<i class="ti ti-microphone"></i>';
    }
  };
  memoRecognition.start();
  memoListening = true;
  memoMicCurrentBtn = btn;
  btn.classList.add('mic-on');
  // 録音中のスタイルはCSSのmic-onクラスで表現
}

// セミナーが完了済みかを判定（開始から1時間経過、または日付が過ぎている）
function isSeminarDone(s) {
  const now = new Date();
  // 日付を解析（'6/10' → 2026/6/10）
  const m = String(s.date || '').match(/(\d+)\/(\d+)/);
  if (!m) return false;
  const month = parseInt(m[1], 10);
  const day = parseInt(m[2], 10);
  const year = 2026;
  // 当日の0時を基準に、日付がすでに過去なら非表示
  const seminarDay = new Date(year, month - 1, day);
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (seminarDay < today) return true;
  // 同日で時刻指定がある場合は開始1時間後で非表示。'随時'は終日表示。
  if (seminarDay.getTime() === today.getTime()) {
    const tm = String(s.time || '').match(/(\d+):(\d+)/);
    if (!tm) return false; // '随時'など
    const start = new Date(year, month - 1, day, parseInt(tm[1],10), parseInt(tm[2],10));
    const oneHourAfter = new Date(start.getTime() + 60 * 60 * 1000);
    return now >= oneHourAfter;
  }
  return false;
}

// venue文字列を解析（ブース番号 or 施設名）
function parseVenue(venue) {
  if (!venue) return null;
  const s = String(venue).trim();
  // ブース番号を抽出（A58, D51, B74 等）
  const m = s.match(/[A-D]\s?\d{1,3}/i);
  if (m) {
    const boothId = m[0].replace(/\s/g, '').toUpperCase();
    if (BOOTH_COORDS[boothId]) {
      return {type: 'booth', id: boothId, label: 'ブース ' + boothId};
    }
  }
  // 施設名でマッチ
  for (const fname of Object.keys(FACILITY_COORDS)) {
    if (s.indexOf(fname) >= 0) {
      return {type: 'facility', id: fname, label: fname};
    }
  }
  return null;
}

function applyViewBox() {
  const svg = document.querySelector('#map-svg-wrap svg');
  if(!svg) return;
  // 範囲制限
  _mapView.w = Math.max(80, Math.min(561, _mapView.w));
  _mapView.h = Math.max(100, Math.min(734, _mapView.h));
  _mapView.x = Math.max(-50, Math.min(561 - _mapView.w + 50, _mapView.x));
  _mapView.y = Math.max(-50, Math.min(734 - _mapView.h + 50, _mapView.y));
  svg.setAttribute('viewBox', _mapView.x+' '+_mapView.y+' '+_mapView.w+' '+_mapView.h);
}

function mapZoomVB(factor) {
  // 現在の中心を保持して拡大縮小
  const cx = _mapView.x + _mapView.w / 2;
  const cy = _mapView.y + _mapView.h / 2;
  _mapView.w *= factor;
  _mapView.h *= factor;
  _mapView.x = cx - _mapView.w / 2;
  _mapView.y = cy - _mapView.h / 2;
  applyViewBox();
}

function mapResetVB() {
  _mapView = { x: 0, y: 0, w: 561, h: 734 };
  applyViewBox();
}

// ドラッグパン・ピンチズーム
function attachMapInteractions() {
  const wrap = document.getElementById('map-svg-wrap');
  if(!wrap) return;
  let dragging = false, lastX = 0, lastY = 0;
  let pinchDist = 0;

  // マウスドラッグ
  wrap.addEventListener('mousedown', function(e) {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    wrap.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    if(!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    const rect = wrap.getBoundingClientRect();
    _mapView.x -= dx * (_mapView.w / rect.width);
    _mapView.y -= dy * (_mapView.h / rect.height);
    applyViewBox();
  });
  window.addEventListener('mouseup', function() {
    dragging = false;
    if(wrap) wrap.style.cursor = 'grab';
  });

  // タッチ（パン＆ピンチ）
  wrap.addEventListener('touchstart', function(e) {
    if(e.touches.length === 1) {
      dragging = true;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    } else if(e.touches.length === 2) {
      dragging = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist = Math.sqrt(dx*dx + dy*dy);
    }
  }, {passive: true});

  wrap.addEventListener('touchmove', function(e) {
    if(e.touches.length === 1 && dragging) {
      const dx = e.touches[0].clientX - lastX;
      const dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
      const rect = wrap.getBoundingClientRect();
      _mapView.x -= dx * (_mapView.w / rect.width);
      _mapView.y -= dy * (_mapView.h / rect.height);
      applyViewBox();
      e.preventDefault();
    } else if(e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(pinchDist > 0) {
        const factor = pinchDist / dist;
        mapZoomVB(factor);
      }
      pinchDist = dist;
      e.preventDefault();
    }
  }, {passive: false});

  wrap.addEventListener('touchend', function() {
    dragging = false;
    pinchDist = 0;
  });

  // ホイールズーム（PC）
  wrap.addEventListener('wheel', function(e) {
    e.preventDefault();
    mapZoomVB(e.deltaY > 0 ? 1.2 : 1/1.2);
  }, {passive: false});
}

// 経路表示
function showRoute() {
  const fromInput = document.getElementById('curLocInput');
  if(!fromInput) return;
  const fromBooth = fromInput.value.trim().toUpperCase();
  if(!fromBooth || !BOOTH_COORDS[fromBooth]) {
    fromInput.style.borderColor = '#E24B4A';
    setTimeout(() => fromInput.style.borderColor = '#d3d1c7', 1500);
    return;
  }
  fromInput.style.borderColor = '#0F6E56';
  const highlightIds = _currentFocus ? [_currentFocus] : _lastBoothIds;
  let focusPos = _currentFocus ? BOOTH_COORDS[_currentFocus] : null;
  if (!_currentFocus && _facilityFocus && FACILITY_COORDS[_facilityFocus]) {
    focusPos = FACILITY_COORDS[_facilityFocus];
  }
  const wrap = document.getElementById('map-svg-wrap');
  if(wrap) {
    wrap.innerHTML = buildMapSVG(highlightIds, focusPos, fromBooth, _facilityFocus);
    applyViewBox();
  }
}

const MAP_BG = {"A": "#FAEEDA", "B": "#E6F1FB", "C": "#E1F5EE", "D": "#FBEAF0"};
const SVG_INNER = ''; // loaded via fetch

function buildMapSVG(highlightIds, focusPos, fromBooth, highlightFacility) {
  // ── 会場レイアウト（venue_map.svgの中身を背景に） ──
  // 読み込み済みならそれを使う、未読込なら最低限の外枠だけ
  const venueLayer = VENUE_SVG_INNER
    ? '<g opacity="0.7">' + VENUE_SVG_INNER + '</g>'
    : '<rect x="2" y="2" width="557" height="730" fill="none" stroke="#999" stroke-width="1.5" rx="4"/>';

  // ── 施設ラベル ──
  let facLayer = '';
  Object.entries(FACILITY_COORDS).forEach(function(entry) {
    const name = entry[0], fac = entry[1];
    const tw = name.length * 5.5 + 14;
    facLayer += '<g>'
      + '<rect x="'+(fac.cx-tw/2)+'" y="'+(fac.cy-7)+'" width="'+tw+'" height="13" rx="3" fill="#0F6E56" opacity="0.92"/>'
      + '<text x="'+fac.cx+'" y="'+(fac.cy+2.5)+'" text-anchor="middle" font-size="5.5" fill="#fff" font-weight="700" font-family="sans-serif">'+(fac.icon||'')+' '+name+'</text>'
      + '</g>';
  });

  // ── 施設ハイライト（セミナー会場など） ──
  let facHighlightLayer = '';
  if (highlightFacility && FACILITY_COORDS[highlightFacility]) {
    const fac = FACILITY_COORDS[highlightFacility];
    facHighlightLayer = '<g>'
      + '<circle cx="'+fac.cx+'" cy="'+fac.cy+'" r="28" fill="#E24B4A" opacity="0.15"><animate attributeName="r" values="20;32;20" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.05;0.4" dur="1.5s" repeatCount="indefinite"/></circle>'
      + '<circle cx="'+fac.cx+'" cy="'+fac.cy+'" r="18" fill="none" stroke="#E24B4A" stroke-width="2.5" opacity="0.9"/>'
      + '</g>';
  }

  // ── ハイライトブース ──
  let hlLayer = '';
  (highlightIds||[]).forEach(function(bid) {
    const pos = BOOTH_COORDS[bid];
    if(!pos) return;
    const s = bid[0];
    const c = MAP_COLORS[s]||'#854F0B', b = MAP_BG[s]||'#FAEEDA';
    hlLayer += '<g>'
      + '<circle cx="'+pos.cx+'" cy="'+pos.cy+'" r="13" fill="'+b+'" stroke="'+c+'" stroke-width="2.5" opacity="0.95"/>'
      + '<text x="'+pos.cx+'" y="'+(pos.cy+1.5)+'" text-anchor="middle" font-size="5.5" fill="'+c+'" font-weight="800" font-family="sans-serif">'+bid+'</text>'
      + '</g>';
  });

  // ── 経路（通路グラフをダイクストラで探索）──
  let routeLayer = '';
  if(fromBooth && BOOTH_COORDS[fromBooth]) {
    const fp = BOOTH_COORDS[fromBooth];

    // 施設への経路（施設フォーカス時）
    if (highlightFacility && FACILITY_COORDS[highlightFacility]) {
      const tp = FACILITY_COORDS[highlightFacility];
      const pathD = findCorridorRoute(fp, tp);
      if(pathD) {
        routeLayer += '<path d="'+pathD+'" stroke="#E24B4A" stroke-width="2.5" fill="none" stroke-dasharray="6,3" opacity="0.95" stroke-linejoin="round" stroke-linecap="round"/>';
        routeLayer += '<circle cx="'+tp.cx+'" cy="'+tp.cy+'" r="4" fill="#E24B4A"/>';
      }
    }

    (highlightIds||[]).forEach(function(bid) {
      if(bid === fromBooth) return;
      const tp = BOOTH_COORDS[bid];
      if(!tp) return;
      const pathD = findCorridorRoute(fp, tp);
      if(pathD) {
        routeLayer += '<path d="'+pathD+'" stroke="#E24B4A" stroke-width="2.5" fill="none" stroke-dasharray="6,3" opacity="0.95" stroke-linejoin="round" stroke-linecap="round"/>';
        routeLayer += '<circle cx="'+tp.cx+'" cy="'+tp.cy+'" r="4" fill="#E24B4A"/>';
      }
    });

    // 現在地マーカー（最前面）
    routeLayer += '<g>'
      + '<circle cx="'+fp.cx+'" cy="'+fp.cy+'" r="16" fill="#185FA5" opacity="0.25"/>'
      + '<circle cx="'+fp.cx+'" cy="'+fp.cy+'" r="11" fill="#185FA5"/>'
      + '<text x="'+fp.cx+'" y="'+(fp.cy+3)+'" text-anchor="middle" font-size="6" fill="#fff" font-weight="700" font-family="sans-serif">現在地</text>'
      + '</g>';
  }

  return '<svg viewBox="0 0 561 734" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;background:#fafaf8">'
    + venueLayer
    + '<g>' + facLayer + '</g>'
    + '<g>' + facHighlightLayer + '</g>'
    + '<g>' + routeLayer + '</g>'
    + '<g>' + hlLayer + '</g>'
    + '</svg>';
}


function initFuse() {
  if (typeof Fuse === 'undefined') return;
  fuse = new Fuse(P, {
    keys: [
      { name: 'company', weight: 3 },
      { name: 'tags',    weight: 2 },
    ],
    threshold:       0.35,
    includeScore:    true,
    ignoreLocation:  true,
    minMatchCharLength: 2,
  });
}

// カテゴリ検索で固定追加するブース
// 業種除外フィルタに引っかかるが表示すべき例外出展社
const CAT_FIXED_BOOTHS = {
  '冷凍生地・冷凍食材': ['C02'], // 株式会社七洋製作所（機械業種だが冷凍食材も扱う）
};

function searchCat(idx) {
  const c = MAIN_CATS[idx];
  search(c.q, c.label, c.excludeBusiness, CAT_FIXED_BOOTHS[c.label] || []);
}

function search(q, label, excludeBusiness, fixedBooths) {
  showLoading();
  searchCount++;

  const qNorm = q.trim().replace(/[\u3000\s]/g, '').toLowerCase();
  if (!qNorm) { showResults([], label); return; }

  const resultMap = new Map();

  // ── 方式1: 2段階タグ検索（日本語自然文・音声入力対応）──
  const matchedKws = new Set();
  P.forEach(item => {
    (item.tags || []).forEach(tag => {
      const t = tag.trim().toLowerCase();
      if (t.length >= 2 && qNorm.indexOf(t) >= 0) matchedKws.add(t);
    });
  });
  if (qNorm.length >= 2) matchedKws.add(qNorm);

  P.forEach(item => {
    // 業種除外フィルタ（例：冷凍カテゴリで機械・包材を除外）
    if (excludeBusiness && excludeBusiness.indexOf(item.business) >= 0) return;

    let score = 0;
    const matched = [];
    (item.tags || []).forEach(tag => {
      const t = tag.trim().toLowerCase();
      if (!t || t.length < 2) return;
      for (const kw of matchedKws) {
        if (t.indexOf(kw) >= 0 || kw.indexOf(t) >= 0) {
          score += kw.length;
          if (matched.indexOf(tag) < 0) matched.push(tag);
          break;
        }
      }
    });
    const co = item.company.replace(/[株式会社㈱㈲有限会社]/g, '').toLowerCase();
    if (co.length >= 2 && (qNorm.indexOf(co) >= 0 || co.indexOf(qNorm) >= 0)) {
      score += 20; matched.push(item.company);
    }
    if (score > 0) resultMap.set(item.booth + '|' + item.company, { item, score, matched });
  });

  // ── 方式2: Fuse.js ファジー検索（誤字・略語・英語対応）──
  if (fuse) {
    fuse.search(q, { limit: 20 }).forEach(r => {
      // 業種除外フィルタ
      if (excludeBusiness && excludeBusiness.indexOf(r.item.business) >= 0) return;

      const key = r.item.booth + '|' + r.item.company;
      const fs  = Math.round((1 - (r.score || 0)) * 8);
      if (resultMap.has(key)) {
        resultMap.get(key).score += fs;
      } else if (fs >= 2) {
        resultMap.set(key, { item: r.item, score: fs, matched: [] });
      }
    });
  }

  const top = [...resultMap.values()]
    .sort((a, b) => b.score - a.score)
    .slice(0, 20)
    .map(r => Object.assign({}, r.item, { score: r.score, matchedTags: r.matched }));

  // アンケート用ブース履歴 & actionLog
  top.forEach(r => {
    if (visitedBooths.indexOf(r.booth) < 0) visitedBooths.push(r.booth);
    logBooth(r.booth, r.company);
  });
  logKeyword(q);

  // ログ記録（同意者のみ）
  const booths = top.map(r => r.booth).join(',');
  if (localStorage.getItem(CONSENT_KEY) === '1') {
    sendLog({ keyword: q, lang: lang, booth: booths, found: top.length > 0 ? 'あり' : 'なし', searchCount: searchCount, gyotai: visitorGyotai, qr: visitorQRCode });
  }

  // 固定追加ブース（除外フィルタの例外）
  if (fixedBooths && fixedBooths.length) {
    fixedBooths.forEach(function(bid) {
      if (top.find(r => r.booth === bid)) return; // 既にある場合はスキップ
      const item = P.find(p => p.booth === bid);
      if (item) top.push(Object.assign({}, item, { score: 1, matchedTags: item.tags || [] }));
    });
  }

  // ── 該当なし & AI ON → AIコンシェルジュにフォールバック ──
  if (top.length === 0 && AI_ENABLED) {
    showResults([], label);
    // 「該当なし」メッセージの下にAI提案を追加
    callOpenAI(q).then(reply => {
      const noResEl = document.getElementById('aiSearchFallback');
      if (!noResEl) return;
      noResEl.innerHTML = '<div style="margin:12px 16px 0;background:#E1F5EE;border-radius:12px;padding:14px;font-size:13px;line-height:1.7">'
        + '<div style="font-weight:600;color:#0F6E56;margin-bottom:6px">&#x1F916; AIコンシェルジュの提案</div>'
        + '<div style="color:#1a1a18">' + escapeHtml(reply).replace(/\n/g,'<br>') + '</div>'
        + '</div>';
    }).catch(() => {});
    return;
  }

  showResults(top, label);
}


function sendLog(params) {
  const url = GAS_URL + '?action=log'
    + '&keyword=' + encodeURIComponent(params.keyword)
    + '&lang='    + encodeURIComponent(lang)
    + '&booth='   + encodeURIComponent(params.booth || '')
    + '&found='   + encodeURIComponent(params.found)
    + '&searchCount=' + (params.searchCount || 0)
    + '&session=' + SESSION_ID
    + '&gyotai='  + encodeURIComponent(params.gyotai || visitorGyotai)
    + '&qr='      + encodeURIComponent(params.qr || visitorQRCode);
  fetch(url).catch(() => {});
}

  if (el.classList.toggle('on')) {
    if (!window._surveyBooths.includes(b)) window._surveyBooths.push(b);
  } else {
    window._surveyBooths = window._surveyBooths.filter(x => x !== b);
  }
}

function submitSurvey() {
  const rating = window._surveyRating || 0;
  const booths = (window._surveyBooths || []).join(',');
  const url = GAS_URL + '?action=survey'
    + '&rating='      + rating
    + '&booths='      + encodeURIComponent(booths)
    + '&searchCount=' + searchCount
    + '&session='     + SESSION_ID;
  fetch(url).catch(() => {});

  document.getElementById('screen').innerHTML = `
  <div class="screen ld-screen">
    <div style="font-size:48px">🎉</div>
    <div class="ld-txt" style="font-size:18px;font-weight:600;color:#1a1a18">ありがとうございました！</div>
    <div class="ld-txt">またのご来場をお待ちしています</div>

}

          <div class="sat-lbl-inline">🎪 総合展の満足度</div>

            <button class="sat-btn" data-cat="event" data-val="2" onclick="setSatV2(this,'event',2)">😐</button>
            <button class="sat-btn" data-cat="event" data-val="1" onclick="setSatV2(this,'event',1)">😢</button>
          </div>
        </div>

        <div class="sat-row-inline" style="margin-top:12px">
          <div class="sat-lbl-inline">📱 このアプリの満足度</div>
          <div class="satisfaction-row">

function setSatV2(btn, cat, v) {
  if (cat === 'event') window._reportSatEvent = v;
  else if (cat === 'app') window._reportSatApp = v;
  // 同じカテゴリの他ボタンの選択解除
  document.querySelectorAll('.sat-btn[data-cat="' + cat + '"]').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

// 旧関数も互換のため残す
function setSat(v, btn) {
  window._reportSatEvent = v;
  document.querySelectorAll('.sat-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

      マイメモはメール送信機能で<br>あなたのPCへ転送できます

    ${myMemos.length > 0 ? `<button onclick="showMyMemo()" style="margin-top:16px;background:#534AB7;color:#fff;border:none;padding:13px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer">📝 メモを送信する</button>` : ''}

}

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  showHome();

// AIコンシェルジュ用 音声入力
function toggleAiMic() {
  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('aiMicBtn');
  const inp = document.getElementById('aiInp');
  if (!SR) { alert('お使いのブラウザは音声入力に対応していません'); return; }
  if (listening) {
    recognition && recognition.stop();
    listening = false;
    if (btn) btn.classList.remove('rec');
    return;
  }
  recognition = new SR();
  recognition.lang = lang==='ja'?'ja-JP':lang==='zh'?'zh-CN':lang==='ko'?'ko-KR':'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    listening = false;
    if (btn) btn.classList.remove('rec');
    if (inp) {
      inp.value = t;
      // 自動で送信
      aiSend();
    }
  };
  recognition.onerror = recognition.onend = () => {
    listening = false;
    if (btn) btn.classList.remove('rec');
  };
  recognition.start();
  listening = true;
  if (btn) btn.classList.add('rec');
}

function toggleMic() {
  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('mic');
  if (!SR) return;
  if (listening) {
    recognition && recognition.stop();
    listening = false;
    if (btn) btn.classList.remove('rec');
    return;
  }
  recognition = new SR();
  recognition.lang = lang==='ja'?'ja-JP':lang==='zh'?'zh-CN':lang==='ko'?'ko-KR':'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    listening = false;
    if (btn) btn.classList.remove('rec');
    search(t, t);
  };
  recognition.onerror = recognition.onend = () => {
    listening = false;
    if (btn) btn.classList.remove('rec');
  };
  recognition.start();
  listening = true;
  if (btn) btn.classList.add('rec');
}
