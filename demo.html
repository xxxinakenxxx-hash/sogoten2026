<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>総合展2026 AIガイド</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f5f3}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;display:flex;justify-content:center}
.app{width:100%;max-width:430px;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:14px 16px 12px;background:#0F6E56;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr .ttl{font-size:15px;font-weight:600;color:#fff}
.hdr .sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px}
.lang-sw{display:flex;gap:3px}
.lb{padding:4px 9px;font-size:11px;border:1px solid rgba(255,255,255,.4);border-radius:6px;background:transparent;color:rgba(255,255,255,.8);cursor:pointer;font-weight:500}
.lb.on{background:#fff;color:#0F6E56;border-color:#fff}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.home-hero{padding:20px 16px 6px}
.home-hero h2{font-size:22px;font-weight:600;color:#1a1a18}
.home-hero p{font-size:14px;color:#73726c;margin-top:4px}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px 0}
.cc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative}
.cc:active{background:#f5f5f3;transform:scale(.97)}
.cc.mc{border-color:#BA7517;background:#FFFBF2}
.cc-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.cc-label{font-size:15px;font-weight:600;color:#1a1a18;line-height:1.3}
.cc-sub{font-size:11px;color:#888780;margin-top:3px}
.cc-arr{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#BA7517;font-size:16px}
.sub-hero{padding:16px 16px 8px}
.sub-hero h2{font-size:19px;font-weight:600;color:#1a1a18}
.sub-hero p{font-size:13px;color:#73726c;margin-top:3px}
.sub-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 16px 16px}
.sc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:center}
.sc:active{background:#f5f5f3;transform:scale(.97)}
.sc-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
.sc-label{font-size:14px;font-weight:600;color:#1a1a18;line-height:1.3}
.sc-cnt{font-size:11px;color:#888780;margin-top:1px}
.mic-area{padding:20px 16px 10px;display:flex;flex-direction:column;align-items:center;gap:10px}
.mic-big{width:80px;height:80px;border-radius:50%;border:none;background:#0F6E56;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:32px;-webkit-tap-highlight-color:transparent}
.mic-big:active{opacity:.85;transform:scale(.96)}
.mic-big.rec{background:#E24B4A}
.mic-lbl{font-size:14px;color:#73726c}
.or-row{display:flex;align-items:center;gap:10px;padding:0 16px}
.or-line{flex:1;height:1px;background:#e8e7e1}
.or-txt{font-size:12px;color:#888780}
.txt-row{display:flex;gap:8px;padding:12px 16px 24px}
.txt-inp{flex:1;padding:13px 16px;font-size:16px;border:1.5px solid #d3d1c7;border-radius:14px;background:#fff;color:#1a1a18;outline:none;-webkit-appearance:none}
.txt-inp:focus{border-color:#0F6E56}
.snd-btn{width:50px;height:50px;border-radius:50%;border:none;background:#0F6E56;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0}
.ld-screen{padding:60px 16px;display:flex;flex-direction:column;align-items:center;gap:16px}
.dots{display:flex;gap:7px}
.dot{width:10px;height:10px;border-radius:50%;background:#0F6E56;animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.ld-txt{font-size:16px;color:#73726c}
.res-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8e7e1;background:#fff;position:sticky;top:0;z-index:10}
.back-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid #d3d1c7;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#444441;font-size:20px;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.back-btn:active{background:#f5f5f3}
.res-q{font-size:15px;font-weight:600;color:#1a1a18;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-cnt{font-size:12px;color:#73726c;white-space:nowrap}
.res-msg{padding:14px 16px 6px;font-size:14px;color:#5F5E5A;line-height:1.7}
.rcards{padding:8px 16px 14px;display:flex;flex-direction:column;gap:10px}
.rc{background:#fff;border:1px solid #e8e7e1;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px}
.rc-booth{width:72px;height:72px;border-radius:12px;background:#FAEEDA;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.rc-bnum{font-size:20px;font-weight:700;color:#854F0B;line-height:1}
.rc-blbl{font-size:10px;color:#BA7517;margin-top:4px}
.rc-co{font-size:16px;font-weight:600;color:#1a1a18;line-height:1.3}
.rc-prod{font-size:13px;color:#73726c;margin-top:5px;line-height:1.4}
.map-sec{margin:0 16px 16px;border:1px solid #e8e7e1;border-radius:14px;overflow:hidden}
.map-hdr{padding:9px 13px;border-bottom:1px solid #e8e7e1;font-size:12px;color:#73726c;display:flex;align-items:center;gap:5px;background:#f9f9f7}
.no-res{padding:48px 16px;text-align:center}
.no-res i{font-size:44px;color:#b4b2a9}
.no-res h3{font-size:19px;font-weight:600;color:#1a1a18;margin:14px 0 7px}
.no-res p{font-size:14px;color:#73726c;line-height:1.7}
/* アンケート */
.survey-wrap{padding:20px 16px}
.survey-title{font-size:18px;font-weight:600;color:#1a1a18;margin-bottom:6px}
.survey-sub{font-size:14px;color:#73726c;margin-bottom:20px}
.rating-row{display:flex;justify-content:space-around;margin-bottom:24px}
.rating-btn{width:72px;height:72px;border-radius:50%;border:2px solid #e8e7e1;background:#fff;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.rating-btn.on{border-color:#0F6E56;background:#E1F5EE}
.survey-q2{font-size:15px;font-weight:600;color:#1a1a18;margin-bottom:10px}
.booth-checks{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.bc{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #e8e7e1;border-radius:10px;cursor:pointer}
.bc.on{border-color:#0F6E56;background:#E1F5EE}
.bc-num{font-size:14px;font-weight:600;color:#854F0B;min-width:40px}
.bc-co{font-size:14px;color:#1a1a18}
.submit-btn{width:100%;padding:16px;background:#0F6E56;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:8px}
.submit-btn:active{opacity:.85}
/* 起動ローディング */
.init-screen{padding:80px 16px;display:flex;flex-direction:column;align-items:center;gap:16px}
.init-logo{font-size:48px;color:#0F6E56}
.init-txt{font-size:15px;color:#73726c}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div><div class="ttl">丸菱グループ 総合展2026</div><div class="sub">6/10・11 マリンメッセ福岡A館</div></div>
  <div class="lang-sw">
    <button class="lb on" onclick="setLang('ja',this)">JA</button>
    <button class="lb" onclick="setLang('en',this)">EN</button>
    <button class="lb" onclick="setLang('zh',this)">中</button>
    <button class="lb" onclick="setLang('ko',this)">한</button>
  </div>
</div>
<div id="screen"></div>
</div>

<script>
// ============================================================
// ★ GAS Web App URL をここに設定してください
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyavH18rQHlhsjPkECUxr9oiyCU0AKhf0aWcG3G53FzF6r1vitTwxDRDULji2iOKU3h/exec';

// ============================================================
// 状態管理
// ============================================================
let lang        = 'ja';
let fuse        = null; // Fuse.js インスタンス
let listening   = false;
let recognition = null;
let searchCount = 0;
let visitedBooths = [];  // アンケート用：検索でヒットしたブース履歴

// セッションID（1回の来場につき1つ）
const SESSION_ID = 'S' + Date.now().toString(36).toUpperCase();

// 商品データ（GASから取得 or フォールバック）
let P = [];
let SEMINARS = [];

// ============================================================
// 起動時：GASからデータ取得
// ============================================================
window.addEventListener('load', async () => {
  // まずサンプルデータで即表示
  P = SAMPLE_P;
  SEMINARS = SAMPLE_SEMINARS;
  initFuse();
  showHome();

  // バックグラウンドでGASからデータ取得（5秒タイムアウト）
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);

    const [prodRes, semRes] = await Promise.all([
      fetch(GAS_URL + '?action=products', {signal: ctrl.signal}),
      fetch(GAS_URL + '?action=seminar',  {signal: ctrl.signal}),
    ]);
    clearTimeout(timer);

    const prodData = await prodRes.json();
    const semData  = await semRes.json();

    if (prodData.products && prodData.products.length > 0) {
      P = prodData.products;
      console.log('✅ GASデータ取得完了: ' + P.length + '社');
    }
    if (semData.seminars && semData.seminars.length > 0) {
      SEMINARS = semData.seminars;
    }
  } catch (e) {
    console.warn('GAS未接続。サンプルデータで動作中。', e.message);
  }
});

// ============================================================
// サンプルデータ（GAS未設定時のフォールバック）
// ============================================================
const SAMPLE_P = [
  {booth:'A-1', company:'フレンチパン神社', tags:['食パン','天然酵母','パン','ミックス粉','製パン']},
  {booth:'A-2', company:'大阪製菓材料',     tags:['グルテンフリー','スポンジ','ケーキ','アレルゲン','卵不使用']},
  {booth:'A-3', company:'北海道乳業',       tags:['生クリーム','乳製品','バター','ホイップ']},
  {booth:'B-1', company:'ベルギーチョコ輸入', tags:['チョコレート','クーベルチュール','製菓','パティシエ']},
  {booth:'C-1', company:'ツジキカイ',       tags:['デッキオーブン','オーブン','製パン','ベーカリー','焼成']},
  {booth:'C-2', company:'鎌田機械製作所',   tags:['リバースシーター','クロワッサン','製パン','モルダー']},
  {booth:'D-1', company:'ラショナルジャパン', tags:['スチームコンベクション','コンビオーブン','業務用']},
];

const SAMPLE_SEMINARS = [
  {date:'6/10',time:'11:00',title:'60歳からの挑戦、ワンオペで利益を出す効率化術',speaker:'㈱テリスラボ 藤田美知男氏',venue:'2Fセミナー会場',reservation:'要予約',type:'セミナー'},
  {date:'6/10',time:'13:00',title:'「接待の手土産」選ばれる商品の共通点',speaker:'㈱ぐるなび 中村千夏氏',venue:'2Fセミナー会場',reservation:'要予約',type:'セミナー'},
  {date:'6/11',time:'11:00',title:'原価高騰でも利益2倍。社長が知らない3つの数字',speaker:'㈱お米デザイン 葉葺正幸氏',venue:'2Fセミナー会場',reservation:'要予約',type:'セミナー'},
  {date:'6/10',time:'随時', title:'小麦粉選びの極意（1日2回・60分）',speaker:'ニップン×パティスリーオーフィルドゥジュール',venue:'会場内実演ブース',reservation:'予約不要',type:'実演'},
  {date:'6/10',time:'随時', title:'デッキオーブン実演',speaker:'㈱ツジ・キカイ×ムッシュイワン',venue:'会場内実演ブース',reservation:'予約不要',type:'実演'},
];

// ============================================================
// カテゴリ定義
// ============================================================
const MAIN_CATS = [
  {icon:'ti-grain',       label:'粉・穀物',          sub:'製粉・米粉・ミックス粉',     bg:'#FAEEDA',ic:'#854F0B', q:'小麦粉 製粉 米粉 強力粉 薄力粉 穀物 ミックス粉'},
  {icon:'ti-droplet',     label:'チョコ・製菓素材',   sub:'チョコ・カカオ・製菓材料',   bg:'#FAECE7',ic:'#993C1D', q:'チョコレート クーベルチュール カカオ 製菓材料 製菓素材'},
  {icon:'ti-milk',        label:'乳製品・油脂',       sub:'クリーム・バター・油脂',     bg:'#E6F1FB',ic:'#185FA5', q:'生クリーム 乳製品 バター マーガリン ショートニング 油脂 チーズ'},
  {icon:'ti-apple',       label:'フルーツ・甘味・ナッツ', sub:'ピューレ・砂糖・蜂蜜・ナッツ', bg:'#EAF3DE',ic:'#3B6D11', q:'フルーツ ピューレ 砂糖 蜂蜜 ナッツ アーモンド メープル ドライフルーツ'},
  {icon:'ti-leaf',        label:'和素材・調味・香料',  sub:'餡・酵母・スパイス・香料',   bg:'#E1F5EE',ic:'#0F6E56', q:'あんこ 餡 和菓子 酵母 イースト スパイス 香料 フレーバー 寒天'},
  {icon:'ti-tool',        label:'機械・設備',          sub:'品目別に選べます',           bg:'#FFF3CD',ic:'#BA7517', q:'MACHINE', isMachine:true},
  {icon:'ti-package',     label:'包材・パッケージ',    sub:'箱・袋・ラベル・リボン',     bg:'#EEEDFE',ic:'#534AB7', q:'包材 パッケージ 箱 袋 ラベル リボン 紙器 缶'},
  {icon:'ti-presentation',label:'セミナー・実演',      sub:'時間・会場・スケジュール',   bg:'#FBEAF0',ic:'#993556', q:'SEMINAR', isSeminar:true},
];

const MACHINE_SUBS = [
  {icon:'ti-flame',         label:'オーブン・製パン機械', sub:'デッキ・ドウコン等', bg:'#FAEEDA',ic:'#854F0B', q:'オーブン デッキオーブン スチームコンベクション 製パン ドウコン リバースシーター モルダー ベーカリー機械 焼成 分割丸目'},
  {icon:'ti-circle-dashed', label:'ミキサー・成形機',     sub:'ニーダー・包あん等', bg:'#E6F1FB',ic:'#185FA5', q:'ミキサー ニーダー 混合機 成形機 包あん機 充填機 アイスクリーム ジェラート'},
  {icon:'ti-snowflake',     label:'冷蔵・冷凍・鮮度',     sub:'冷蔵庫・急速冷凍等', bg:'#EAF3DE',ic:'#3B6D11', q:'冷蔵庫 冷凍庫 フリーザー ショーケース 製氷機 急速冷凍 鮮度保持 DENBA'},
  {icon:'ti-coffee',        label:'コーヒー・飲料機器',   sub:'エスプレッソ等',     bg:'#FAECE7',ic:'#993C1D', q:'コーヒーマシン エスプレッソ コーヒー焙煎 飲料機器'},
  {icon:'ti-spray',         label:'洗浄・衛生用品',       sub:'食器洗浄・衛生等',   bg:'#E1F5EE',ic:'#0F6E56', q:'食器洗浄機 洗浄剤 衛生管理 手袋 キャップ 衛生用品'},
  {icon:'ti-box',           label:'包装・IT・その他',     sub:'POS・開業支援等',   bg:'#EEEDFE',ic:'#534AB7', q:'包装機械 シーラー POSレジ ITシステム フードプリンター 開業 厨房機器 脱酸素'},
];

const T = {
  ja:{welcome:'何をお探しですか？',sub:'カテゴリを選ぶか、話しかけてください',ph:'商品・ブース名を入力...',micLbl:'話しかける',searching:'検索しています...'},
  en:{welcome:'What are you looking for?',sub:'Choose a category or speak',ph:'Search products or booths...',micLbl:'Speak',searching:'Searching...'},
  zh:{welcome:'您在找什么？',sub:'选择类别或用语音搜索',ph:'搜索商品或展台...',micLbl:'语音搜索',searching:'搜索中...'},
  ko:{welcome:'무엇을 찾고 계신가요？',sub:'카테고리를 선택하거나 말씀해 주세요',ph:'상품 또는 부스 검색...',micLbl:'말하기',searching:'검색 중...'},
};

// ============================================================
// 画面描画
// ============================================================
function showInit() {
  document.getElementById('screen').innerHTML = `
  <div class="screen init-screen">
    <div class="init-logo"><i class="ti ti-search"></i></div>
    <div class="init-txt">データを読み込んでいます...</div>
  </div>`;
}

function showHome() {
  const t = T[lang];
  const cats = MAIN_CATS.map(c => {
    const arr = c.isMachine ? `<span class="cc-arr"><i class="ti ti-chevron-right"></i></span>` : '';
    const cls = c.isMachine ? ' mc' : '';
    const fn  = c.isMachine  ? `showMachineMenu()`
              : c.isSeminar  ? `showSeminars()`
              : `search('${c.q}','${c.label}')`;
    return `<div class="cc${cls}" onclick="${fn}">
      <div class="cc-icon" style="background:${c.bg};color:${c.ic}"><i class="ti ${c.icon}"></i></div>
      <div><div class="cc-label">${c.label}</div><div class="cc-sub">${c.sub}</div></div>
      ${arr}
    </div>`;
  }).join('');

  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="home-hero"><h2>${t.welcome}</h2><p>${t.sub}</p></div>
    <div class="cat-grid">${cats}</div>
    <div class="mic-area">
      <button class="mic-big" id="mic" onclick="toggleMic()"><i class="ti ti-microphone"></i></button>
      <div class="mic-lbl">${t.micLbl}</div>
    </div>
    <div class="or-row"><div class="or-line"></div><div class="or-txt">または</div><div class="or-line"></div></div>
    <div class="txt-row">
      <input class="txt-inp" id="qi" placeholder="${t.ph}" onkeydown="if(event.key==='Enter'){var v=this.value.trim();if(v){search(v,v);this.value=''}}">
      <button class="snd-btn" onclick="var v=document.getElementById('qi');if(v&&v.value.trim()){search(v.value.trim(),v.value.trim());v.value=''}"><i class="ti ti-send" style="font-size:18px"></i></button>
    </div>
  </div>`;
}

function showMachineMenu() {
  const subs = MACHINE_SUBS.map(s => `
    <div class="sc" onclick="search('${s.q}','${s.label}')">
      <div class="sc-icon" style="background:${s.bg};color:${s.ic}"><i class="ti ${s.icon}"></i></div>
      <div class="sc-label">${s.label}</div>
      <div class="sc-cnt">${s.sub}</div>
    </div>`).join('');

  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="res-hdr">
      <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left"></i></button>
      <div class="res-q">機械・設備</div>
    </div>
    <div class="sub-hero"><h2>品目から選ぶ</h2><p>探している機械の種類を選んでください</p></div>
    <div class="sub-grid">${subs}</div>
    <div class="or-row" style="padding:0 16px 8px"><div class="or-line"></div><div class="or-txt">またはキーワードで検索</div><div class="or-line"></div></div>
    <div class="txt-row">
      <input class="txt-inp" id="qi2" placeholder="例：デッキオーブン、ミキサー..." onkeydown="if(event.key==='Enter'){var v=this.value.trim();if(v){search(v,v);this.value=''}}">
      <button class="snd-btn" onclick="var v=document.getElementById('qi2');if(v&&v.value.trim()){search(v.value.trim(),v.value.trim());v.value=''}"><i class="ti ti-send" style="font-size:18px"></i></button>
    </div>
  </div>`;
}

function showSeminars() {
  const byDate = {};
  SEMINARS.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });

  let html = '';
  for (const [date, items] of Object.entries(byDate)) {
    html += `<div style="padding:12px 16px 4px;font-size:13px;font-weight:600;color:#0F6E56;border-bottom:1px solid #e8e7e1">${date}</div>`;
    items.forEach(s => {
      const badge = s.type === '実演'
        ? `<span style="background:#FAEEDA;color:#854F0B;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600">実演</span>`
        : `<span style="background:#E6F1FB;color:#185FA5;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600">セミナー</span>`;
      const rsv = s.reservation === '要予約'
        ? `<span style="color:#E24B4A;font-size:12px">● 要予約</span>`
        : `<span style="color:#0F6E56;font-size:12px">● 予約不要</span>`;
      html += `<div style="padding:12px 16px;border-bottom:1px solid #e8e7e1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
          <span style="font-size:16px;font-weight:700;color:#1a1a18">${s.time}</span>
          ${badge} ${rsv}
        </div>
        <div style="font-size:15px;font-weight:600;color:#1a1a18;margin-bottom:3px">${s.title}</div>
        <div style="font-size:13px;color:#73726c">${s.speaker}</div>
        <div style="font-size:12px;color:#888780;margin-top:2px"><i class="ti ti-map-pin" style="font-size:12px"></i> ${s.venue}</div>
      </div>`;
    });
  }

  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="res-hdr">
      <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left"></i></button>
      <div class="res-q">セミナー・実演スケジュール</div>
    </div>
    ${html}
  </div>`;
}

function showLoading() {
  document.getElementById('screen').innerHTML = `
  <div class="screen ld-screen">
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="ld-txt">${T[lang].searching}</div>

function showResults(results, label) {
  let cards = '';
  results.forEach(r => {
    cards += `<div class="rc">
      <div class="rc-booth"><div class="rc-bnum">${r.booth}</div><div class="rc-blbl">ブース</div></div>
      <div><div class="rc-co">${r.company}</div><div class="rc-prod">${r.matchedTags ? r.matchedTags.slice(0,3).join('・') : ''}</div></div>
    </div>`;
  });

  const noRes = !results.length ? `
    <div class="no-res">
      <i class="ti ti-search"></i>
      <h3>見つかりませんでした</h3>
      <p>別のキーワードで検索してみてください</p>
    </div>` : '';

  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="res-hdr">
      <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left"></i></button>
      <div class="res-q">${label}</div>
      ${results.length ? `<div class="res-cnt">${results.length}件</div>` : ''}
    </div>
    ${results.length ? `<div class="res-msg">「${label}」に関連するブースが${results.length}件見つかりました</div>` : ''}
    <div class="rcards">${cards}</div>
    ${noRes}
  </div>`;
}

// ============================================================
// 検索エンジン（Fuse.js ライク・タグマッチ）
// ============================================================
function initFuse() {
  if (typeof Fuse === 'undefined') return;
  fuse = new Fuse(P, {
    keys: [
      { name: 'company', weight: 3 },
      { name: 'tags',    weight: 2 },
    ],
    threshold:       0.35,
    includeScore:    true,
    ignoreLocation:  true,
    minMatchCharLength: 2,
  });
}

function search(q, label) {
  showLoading();
  searchCount++;

  const qNorm = q.trim().replace(/[\u3000\s]/g, '').toLowerCase();
  if (!qNorm) { showResults([], label); return; }

  const resultMap = new Map();

  // ── 方式1: 2段階タグ検索（日本語自然文・音声入力対応）──
  const matchedKws = new Set();
  P.forEach(item => {
    (item.tags || []).forEach(tag => {
      const t = tag.trim().toLowerCase();
      if (t.length >= 2 && qNorm.indexOf(t) >= 0) matchedKws.add(t);
    });
  });
  if (qNorm.length >= 2) matchedKws.add(qNorm);

  P.forEach(item => {
    let score = 0;
    const matched = [];
    (item.tags || []).forEach(tag => {
      const t = tag.trim().toLowerCase();
      if (!t || t.length < 2) return;
      for (const kw of matchedKws) {
        if (t.indexOf(kw) >= 0 || kw.indexOf(t) >= 0) {
          score += kw.length;
          if (matched.indexOf(tag) < 0) matched.push(tag);
          break;
        }
      }
    });
    const co = item.company.replace(/[株式会社㈱㈲有限会社]/g, '').toLowerCase();
    if (co.length >= 2 && (qNorm.indexOf(co) >= 0 || co.indexOf(qNorm) >= 0)) {
      score += 20; matched.push(item.company);
    }
    if (score > 0) resultMap.set(item.booth + '|' + item.company, { item, score, matched });
  });

  // ── 方式2: Fuse.js ファジー検索（誤字・略語・英語対応）──
  if (fuse) {
    fuse.search(q, { limit: 20 }).forEach(r => {
      const key = r.item.booth + '|' + r.item.company;
      const fs  = Math.round((1 - (r.score || 0)) * 8);
      if (resultMap.has(key)) {
        resultMap.get(key).score += fs;
      } else if (fs >= 2) {
        resultMap.set(key, { item: r.item, score: fs, matched: [] });
      }
    });
  }

  const top = [...resultMap.values()]
    .sort((a, b) => b.score - a.score)
    .slice(0, 20)
    .map(r => Object.assign({}, r.item, { score: r.score, matchedTags: r.matched }));


function sendLog(params) {
  const url = GAS_URL + '?action=log'
    + '&keyword=' + encodeURIComponent(params.keyword)
    + '&lang='    + encodeURIComponent(lang)
    + '&booth='   + encodeURIComponent(params.booth)
    + '&found='   + encodeURIComponent(params.found)
    + '&searchCount=' + params.searchCount
    + '&session=' + SESSION_ID;
  fetch(url).catch(() => {});  // エラーは無視
}

// アンケート（帰り際）
// ============================================================
function showSurvey() {
  let rating = 0;
  const booths = visitedBooths.slice(0, 8);  // 最大8ブース表示

  const boothChecks = booths.map((b, i) => {
    const co = P.find(p => p.booth === b);
    return `<div class="bc" id="bc${i}" onclick="toggleBooth(${i})">
      <span class="bc-num">${b}</span>
      <span class="bc-co">${co ? co.company : b}</span>
    </div>`;
  }).join('');

  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="res-hdr">
      <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left"></i></button>
      <div class="res-q">帰り際アンケート</div>
    </div>
    <div class="survey-wrap">
      <div class="survey-title">本日はいかがでしたか？</div>
      <div class="survey-sub">1タップで回答できます</div>
      <div class="rating-row">
        <button class="rating-btn" id="r1" onclick="setRating(1)">😊</button>
        <button class="rating-btn" id="r2" onclick="setRating(2)">😐</button>
        <button class="rating-btn" id="r3" onclick="setRating(3)">😞</button>
      </div>
      ${booths.length ? `
      <div class="survey-q2">良かったブースを教えてください（複数OK）</div>
      <div class="booth-checks" id="boothChecks">${boothChecks}</div>
      ` : ''}
      <button class="submit-btn" onclick="submitSurvey()">送信する</button>
    </div>
  </div>`;

  window._surveyRating = 0;
  window._surveyBooths = [];
}

function setRating(r) {
  window._surveyRating = r;
  [1,2,3].forEach(i => document.getElementById('r'+i).classList.toggle('on', i===r));
}

function toggleBooth(i) {
  const el = document.getElementById('bc'+i);
  const b  = visitedBooths[i];
  if (el.classList.toggle('on')) {
    if (!window._surveyBooths.includes(b)) window._surveyBooths.push(b);
  } else {
    window._surveyBooths = window._surveyBooths.filter(x => x !== b);
  }
}

function submitSurvey() {
  const rating = window._surveyRating || 0;
  const booths = (window._surveyBooths || []).join(',');
  const url = GAS_URL + '?action=survey'
    + '&rating='      + rating
    + '&booths='      + encodeURIComponent(booths)
    + '&searchCount=' + searchCount
    + '&session='     + SESSION_ID;
  fetch(url).catch(() => {});

  document.getElementById('screen').innerHTML = `
  <div class="screen ld-screen">
    <div style="font-size:48px">🎉</div>
    <div class="ld-txt" style="font-size:18px;font-weight:600;color:#1a1a18">ありがとうございました！</div>
    <div class="ld-txt">またのご来場をお待ちしています</div>
  </div>`;
}

// ============================================================
// 言語切替 / 音声入力
// ============================================================
function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  showHome();
}

function toggleMic() {
  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('mic');
  if (!SR) return;
  if (listening) {
    recognition && recognition.stop();
    listening = false;
    if (btn) btn.classList.remove('rec');
    return;
  }
  recognition = new SR();
  recognition.lang = lang==='ja'?'ja-JP':lang==='zh'?'zh-CN':lang==='ko'?'ko-KR':'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    listening = false;
    if (btn) btn.classList.remove('rec');
    search(t, t);
  };
  recognition.onerror = recognition.onend = () => {
    listening = false;
    if (btn) btn.classList.remove('rec');
  };
  recognition.start();
  listening = true;
  if (btn) btn.classList.add('rec');
}
