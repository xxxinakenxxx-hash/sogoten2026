<script>
// ============================================================
// ★ GAS Web App URL をここに設定してください
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyavH18rQHlhsjPkECUxr9oiyCU0AKhf0aWcG3G53FzF6r1vitTwxDRDULji2iOKU3h/exec';

// ============================================================
// 状態管理
// ============================================================
let lang        = 'ja';
let fuse        = null; // Fuse.js インスタンス
let listening   = false;
let recognition = null;
let searchCount = 0;
let visitedBooths = [];  // アンケート用：検索でヒットしたブース履歴

// セッションID（1回の来場につき1つ）
const SESSION_ID = 'S' + Date.now().toString(36).toUpperCase();

// 商品データ（GASから取得 or フォールバック）
let P = [];
let SEMINARS = [];
let VENUE_SVG_INNER = '';  // venue_map.svgの中身（fetchで取得）

// ============================================================
// 通路データ（ユーザー指定）
// ============================================================
const H_CORRIDORS = [
  {"y":366,"x1":11,"x2":525},{"y":723,"x1":13,"x2":477},{"y":676,"x1":14,"x2":476},
  {"y":511,"x1":114,"x2":453},{"y":443,"x1":108,"x2":447},{"y":525,"x1":454,"x2":530},
  {"y":88,"x1":40,"x2":522},{"y":240,"x1":42,"x2":115},{"y":198,"x1":118,"x2":280},
  {"y":129,"x1":118,"x2":280},{"y":158,"x1":280,"x2":447},{"y":289,"x1":283,"x2":451},
  {"y":266,"x1":116,"x2":281},{"y":494,"x1":41,"x2":104},{"y":214,"x1":449,"x2":527},
  {"y":578,"x1":107,"x2":475},{"y":627,"x1":108,"x2":473},{"y":644,"x1":476,"x2":529}
];
const V_CORRIDORS = [
  {"x":450,"y1":88,"y2":365},{"x":524,"y1":88,"y2":365},{"x":282,"y1":89,"y2":367},
  {"x":282,"y1":367,"y2":723},{"x":127,"y1":676,"y2":722},{"x":14,"y1":675,"y2":723},
  {"x":39,"y1":492,"y2":674},{"x":108,"y1":364,"y2":675},{"x":452,"y1":365,"y2":525},
  {"x":474,"y1":526,"y2":723},{"x":528,"y1":365,"y2":642},{"x":118,"y1":90,"y2":266},
  {"x":120,"y1":268,"y2":367},{"x":41,"y1":88,"y2":365}
];

// ============================================================
// 通路グラフ構築（起動時に1回）
// ============================================================
let CORRIDOR_GRAPH = null;
function buildCorridorGraph() {
  const nodes = []; // {x,y}
  const edges = []; // {a,b,d}
  function findOrAdd(x, y) {
    for(let i=0; i<nodes.length; i++) {
      if(Math.abs(nodes[i].x-x)<0.5 && Math.abs(nodes[i].y-y)<0.5) return i;
    }
    nodes.push({x:x, y:y});
    return nodes.length - 1;
  }

  // H通路ごとに端点+交差点をノード化、隣接エッジ
  H_CORRIDORS.forEach(function(h) {
    const pts = [{x:h.x1, y:h.y}, {x:h.x2, y:h.y}];
    V_CORRIDORS.forEach(function(v) {
      if(v.x >= h.x1 && v.x <= h.x2 && h.y >= v.y1 && h.y <= v.y2) {
        pts.push({x:v.x, y:h.y});
      }
    });
    pts.sort(function(a,b){return a.x-b.x;});
    let prev = -1;
    pts.forEach(function(p) {
      const id = findOrAdd(p.x, p.y);
      if(prev !== -1 && prev !== id) {
        edges.push({a:prev, b:id, d:Math.abs(nodes[id].x - nodes[prev].x)});
      }
      prev = id;
    });
  });

  // V通路も同様
  V_CORRIDORS.forEach(function(v) {
    const pts = [{x:v.x, y:v.y1}, {x:v.x, y:v.y2}];
    H_CORRIDORS.forEach(function(h) {
      if(v.x >= h.x1 && v.x <= h.x2 && h.y >= v.y1 && h.y <= v.y2) {
        pts.push({x:v.x, y:h.y});
      }
    });
    pts.sort(function(a,b){return a.y-b.y;});
    let prev = -1;
    pts.forEach(function(p) {
      const id = findOrAdd(p.x, p.y);
      if(prev !== -1 && prev !== id) {
        edges.push({a:prev, b:id, d:Math.abs(nodes[id].y - nodes[prev].y)});
      }
      prev = id;
    });
  });

  // 近接ノード自動接続（通路端点の僅かなズレを吸収。例:x=282/y2=721 と y=723通路）
  const TOL = 6;
  for(let i=0; i<nodes.length; i++) {
    for(let j=i+1; j<nodes.length; j++) {
      const dx = nodes[i].x - nodes[j].x;
      const dy = nodes[i].y - nodes[j].y;
      const d = Math.hypot(dx, dy);
      if(d > 0 && d <= TOL) {
        edges.push({a:i, b:j, d:d});
      }
    }
  }
  return {nodes:nodes, edges:edges};
}

// ブース座標から最寄り通路点の候補リストを返す（上位n個）
function nearestCorridorPoints(bx, by, n) {
  n = n || 5;
  const cands = [];
  H_CORRIDORS.forEach(function(h, i) {
    let px;
    if(bx < h.x1) px = h.x1;
    else if(bx > h.x2) px = h.x2;
    else px = bx;
    cands.push({x:px, y:h.y, type:'h', idx:i, dist:Math.hypot(bx-px, by-h.y)});
  });
  V_CORRIDORS.forEach(function(v, i) {
    let py;
    if(by < v.y1) py = v.y1;
    else if(by > v.y2) py = v.y2;
    else py = by;
    cands.push({x:v.x, y:py, type:'v', idx:i, dist:Math.hypot(bx-v.x, by-py)});
  });
  cands.sort(function(a,b){ return a.dist - b.dist; });
  return cands.slice(0, n);
}

// 旧nearestCorridorPoint（残しておく：互換用）
function nearestCorridorPoint(bx, by) {
  const list = nearestCorridorPoints(bx, by, 1);
  return list[0];
}

// エントリーポイントをグラフに追加し、そのノードIDを返す
function insertEntryNode(graph, entry) {
  // 既存ノードに同座標があれば再利用
  for(let i=0; i<graph.nodes.length; i++) {
    if(Math.abs(graph.nodes[i].x-entry.x)<0.5 && Math.abs(graph.nodes[i].y-entry.y)<0.5) return i;
  }
  const newId = graph.nodes.length;
  graph.nodes.push({x:entry.x, y:entry.y});
  // 同じ通路上の全ノードと接続（後続のダイクストラで最短が選ばれる）
  if(entry.type === 'h') {
    const h = H_CORRIDORS[entry.idx];
    graph.nodes.forEach(function(n, i) {
      if(i === newId) return;
      if(Math.abs(n.y - h.y) < 0.5 && n.x >= h.x1 - 0.5 && n.x <= h.x2 + 0.5) {
        graph.edges.push({a:newId, b:i, d:Math.abs(entry.x - n.x)});
      }
    });
  } else {
    const v = V_CORRIDORS[entry.idx];
    graph.nodes.forEach(function(n, i) {
      if(i === newId) return;
      if(Math.abs(n.x - v.x) < 0.5 && n.y >= v.y1 - 0.5 && n.y <= v.y2 + 0.5) {
        graph.edges.push({a:newId, b:i, d:Math.abs(entry.y - n.y)});
      }
    });
  }
  return newId;
}

// ============================================================
// ダイクストラ最短経路
// ============================================================
function dijkstra(graph, start, end) {
  const n = graph.nodes.length;
  const dist = new Array(n).fill(Infinity);
  const prev = new Array(n).fill(-1);
  const visited = new Array(n).fill(false);
  const adj = new Array(n).fill(null).map(function(){return [];});
  graph.edges.forEach(function(e) {
    adj[e.a].push({to:e.b, w:e.d});
    adj[e.b].push({to:e.a, w:e.d});
  });
  dist[start] = 0;
  for(let i=0; i<n; i++) {
    let u = -1, mn = Infinity;
    for(let j=0; j<n; j++) {
      if(!visited[j] && dist[j] < mn) { mn = dist[j]; u = j; }
    }
    if(u === -1 || u === end) break;
    visited[u] = true;
    adj[u].forEach(function(e) {
      if(dist[u] + e.w < dist[e.to]) {
        dist[e.to] = dist[u] + e.w;
        prev[e.to] = u;
      }
    });
  }
  if(dist[end] === Infinity) return [];
  const path = [];
  for(let cur = end; cur !== -1; cur = prev[cur]) path.unshift(cur);
  return path;
}

// 経路探索メイン：ブースから「最寄りの通路」に直角に出て、そこから通路グラフで最短探索
function findCorridorRoute(from, to) {
  if(!CORRIDOR_GRAPH) return null;
  // それぞれ最寄りの通路点（1点のみ）→ ブース→通路を必ず通る
  const fEntry = nearestCorridorPoint(from.cx, from.cy);
  const tEntry = nearestCorridorPoint(to.cx, to.cy);
  if(!fEntry || !tEntry) return null;

  // グラフをコピー（エントリーノード追加用）
  const g = {
    nodes: CORRIDOR_GRAPH.nodes.map(function(n){return {x:n.x, y:n.y};}),
    edges: CORRIDOR_GRAPH.edges.slice()
  };
  const fId = insertEntryNode(g, fEntry);
  const tId = insertEntryNode(g, tEntry);
  const path = dijkstra(g, fId, tId);
  if(path.length === 0) return null;

  // ブース→通路点を「直角」にする（斜め線でブース壁を貫通するのを防ぐ）
  function rectifyEntry(boothXY, entry) {
    if(Math.abs(boothXY.x - entry.x) < 0.5 || Math.abs(boothXY.y - entry.y) < 0.5) {
      return [boothXY, {x:entry.x, y:entry.y}];
    }
    if(entry.type === 'h') {
      return [boothXY, {x:boothXY.x, y:entry.y}, {x:entry.x, y:entry.y}];
    } else {
      return [boothXY, {x:entry.x, y:boothXY.y}, {x:entry.x, y:entry.y}];
    }
  }
  const fromPart = rectifyEntry({x:from.cx, y:from.cy}, fEntry);
  const toPart = rectifyEntry({x:to.cx, y:to.cy}, tEntry).slice().reverse();
  const midPath = path.map(function(id){ return g.nodes[id]; });

  let points = [].concat(fromPart, midPath, toPart);
  // 連続する同座標を除去
  const clean = [points[0]];
  for(let i=1; i<points.length; i++) {
    const p = points[i], last = clean[clean.length-1];
    if(Math.abs(p.x-last.x)>0.5 || Math.abs(p.y-last.y)>0.5) clean.push(p);
  }
  // 経路の両端をブース円の手前(11px)で止める
  if(clean.length >= 2) {
    const p0 = clean[0], p1 = clean[1];
    const dx = p1.x - p0.x, dy = p1.y - p0.y, len = Math.hypot(dx, dy);
    if(len > 14) clean[0] = { x: p0.x + dx/len*11, y: p0.y + dy/len*11 };
    const pN = clean[clean.length-1], pN1 = clean[clean.length-2];
    const dx2 = pN1.x - pN.x, dy2 = pN1.y - pN.y, len2 = Math.hypot(dx2, dy2);
    if(len2 > 14) clean[clean.length-1] = { x: pN.x + dx2/len2*11, y: pN.y + dy2/len2*11 };
  }
  return 'M' + clean.map(function(p){return p.x+','+p.y;}).join(' L');
}

let _mapView = { x: 0, y: 0, w: 561, h: 734 };

// ============================================================
// 起動時：GASからデータ取得
// ============================================================
window.addEventListener('load', async () => {
  // 通路グラフ構築（即時）
  CORRIDOR_GRAPH = buildCorridorGraph();
  console.log('✅ 通路グラフ構築: ノード'+CORRIDOR_GRAPH.nodes.length+'個, エッジ'+CORRIDOR_GRAPH.edges.length+'本');

  // ローディング表示
  document.getElementById('screen').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#fafaf8">
      <div style="width:50px;height:50px;border:4px solid #e8e7e1;border-top-color:#0F6E56;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px"></div>
      <div style="color:#73726c;font-size:14px">出展社データを読み込み中…</div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>`;

  // 会場SVG読込（並行）
  const svgPromise = fetch('venue_map.svg')
    .then(r => r.ok ? r.text() : '')
    .then(svgText => {
      const m = svgText.match(/<svg[^>]*>([\s\S]*)<\/svg>/);
      if(m) {
        VENUE_SVG_INNER = m[1];
        console.log('✅ 会場SVG読込完了');
      }
    })
    .catch(e => console.warn('会場SVG読込失敗:', e.message));

  // GASからデータ取得（完了を待つ・10秒タイムアウト）
  let gasOK = false;
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 10000);
    const [prodRes, semRes] = await Promise.all([
      fetch(GAS_URL + '?action=products', {signal: ctrl.signal}),
      fetch(GAS_URL + '?action=seminar',  {signal: ctrl.signal}),
    ]);
    clearTimeout(timer);
    const prodData = await prodRes.json();
    const semData  = await semRes.json();
    if (prodData.products && prodData.products.length > 0) {
      P = prodData.products;
      gasOK = true;
      console.log('✅ GASデータ取得完了: ' + P.length + '社');
    }
    if (semData.seminars && semData.seminars.length > 0) {
      SEMINARS = semData.seminars;
    }
  } catch (e) {
    console.warn('GAS未接続。サンプルデータで動作。', e.message);
  }

  // GAS失敗時のみフォールバック
  if(!gasOK) {
    P = SAMPLE_P;
    SEMINARS = SAMPLE_SEMINARS;
  }

  // SVG読込も待つ
  await svgPromise;

  // Fuse.js初期化＆ホーム表示
  initFuse();
  showHome();
});

  const focusPos = focusBooth ? BOOTH_COORDS[focusBooth] : null;

        <button onclick="mapZoomVB(1/1.5)" style="width:42px;height:42px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:22px;font-weight:700;color:#0F6E56;cursor:pointer">＋</button>
        <button onclick="mapZoomVB(1.5)" style="width:42px;height:42px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:22px;font-weight:700;color:#0F6E56;cursor:pointer">−</button>
        <button onclick="mapResetVB()" style="width:42px;height:42px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:14px;font-weight:700;color:#0F6E56;cursor:pointer">⛶</button>
      </div>
    </div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:10px 16px calc(10px + env(safe-area-inset-bottom)) 16px;background:#fff;border-top:1px solid #e8e7e1;z-index:30;box-shadow:0 -2px 8px rgba(0,0,0,.06)">

      <div style="display:flex;gap:8px">

          style="flex:1;padding:10px 14px;border:1.5px solid #d3d1c7;border-radius:10px;font-size:16px;outline:none;text-transform:uppercase"
          onkeydown="if(event.key==='Enter')showRoute()">
        <button onclick="showRoute()" 
          style="padding:10px 16px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer">
          経路
        </button>
      </div>

  </div>`;

  // フォーカス時はそのブースを中心に拡大
  if(focusPos) {
    _mapView = { x: focusPos.cx - 100, y: focusPos.cy - 130, w: 200, h: 260 };
    applyViewBox();
  }
  attachMapInteractions();
}

function applyViewBox() {
  const svg = document.querySelector('#map-svg-wrap svg');
  if(!svg) return;
  // 範囲制限
  _mapView.w = Math.max(80, Math.min(561, _mapView.w));
  _mapView.h = Math.max(100, Math.min(734, _mapView.h));
  _mapView.x = Math.max(-50, Math.min(561 - _mapView.w + 50, _mapView.x));
  _mapView.y = Math.max(-50, Math.min(734 - _mapView.h + 50, _mapView.y));
  svg.setAttribute('viewBox', _mapView.x+' '+_mapView.y+' '+_mapView.w+' '+_mapView.h);
}

function mapZoomVB(factor) {
  // 現在の中心を保持して拡大縮小
  const cx = _mapView.x + _mapView.w / 2;
  const cy = _mapView.y + _mapView.h / 2;
  _mapView.w *= factor;
  _mapView.h *= factor;
  _mapView.x = cx - _mapView.w / 2;
  _mapView.y = cy - _mapView.h / 2;
  applyViewBox();
}

function mapResetVB() {
  _mapView = { x: 0, y: 0, w: 561, h: 734 };
  applyViewBox();
}

function attachMapInteractions() {
  const wrap = document.getElementById('map-svg-wrap');
  if(!wrap) return;
  let dragging = false, lastX = 0, lastY = 0;
  let pinchDist = 0;

  // マウスドラッグ
  wrap.addEventListener('mousedown', function(e) {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    wrap.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', function(e) {
    if(!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    const rect = wrap.getBoundingClientRect();
    _mapView.x -= dx * (_mapView.w / rect.width);
    _mapView.y -= dy * (_mapView.h / rect.height);
    applyViewBox();
  });
  window.addEventListener('mouseup', function() {
    dragging = false;
    if(wrap) wrap.style.cursor = 'grab';
  });

  // タッチ（パン＆ピンチ）
  wrap.addEventListener('touchstart', function(e) {
    if(e.touches.length === 1) {
      dragging = true;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
    } else if(e.touches.length === 2) {
      dragging = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist = Math.sqrt(dx*dx + dy*dy);
    }
  }, {passive: true});

  wrap.addEventListener('touchmove', function(e) {
    if(e.touches.length === 1 && dragging) {
      const dx = e.touches[0].clientX - lastX;
      const dy = e.touches[0].clientY - lastY;
      lastX = e.touches[0].clientX;
      lastY = e.touches[0].clientY;
      const rect = wrap.getBoundingClientRect();
      _mapView.x -= dx * (_mapView.w / rect.width);
      _mapView.y -= dy * (_mapView.h / rect.height);
      applyViewBox();
      e.preventDefault();
    } else if(e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(pinchDist > 0) {
        const factor = pinchDist / dist;
        mapZoomVB(factor);
      }
      pinchDist = dist;
      e.preventDefault();
    }
  }, {passive: false});

  wrap.addEventListener('touchend', function() {
    dragging = false;
    pinchDist = 0;
  });

  // ホイールズーム（PC）
  wrap.addEventListener('wheel', function(e) {
    e.preventDefault();
    mapZoomVB(e.deltaY > 0 ? 1.2 : 1/1.2);
  }, {passive: false});
}

  const highlightIds = _currentFocus ? [_currentFocus] : _lastBoothIds;
  const focusPos = _currentFocus ? BOOTH_COORDS[_currentFocus] : null;
  const wrap = document.getElementById('map-svg-wrap');
  if(wrap) {
    wrap.innerHTML = buildMapSVG(highlightIds, focusPos, fromBooth);
    applyViewBox();
  }
}

function buildMapSVG(highlightIds, focusPos, fromBooth) {
  // ── 会場レイアウト（venue_map.svgの中身を背景に） ──
  // 読み込み済みならそれを使う、未読込なら最低限の外枠だけ
  const venueLayer = VENUE_SVG_INNER
    ? '<g opacity="0.7">' + VENUE_SVG_INNER + '</g>'
    : '<rect x="2" y="2" width="557" height="730" fill="none" stroke="#999" stroke-width="1.5" rx="4"/>';

  // ── 施設ラベル ──
  let facLayer = '';
  Object.entries(FACILITY_COORDS).forEach(function(entry) {
    const name = entry[0], fac = entry[1];
    const tw = name.length * 5.5 + 14;
    facLayer += '<g>'
      + '<rect x="'+(fac.cx-tw/2)+'" y="'+(fac.cy-7)+'" width="'+tw+'" height="13" rx="3" fill="#0F6E56" opacity="0.92"/>'
      + '<text x="'+fac.cx+'" y="'+(fac.cy+2.5)+'" text-anchor="middle" font-size="5.5" fill="#fff" font-weight="700" font-family="sans-serif">'+(fac.icon||'')+' '+name+'</text>'
      + '</g>';
  });

  // ── ハイライトブース ──
  let hlLayer = '';
  (highlightIds||[]).forEach(function(bid) {
    const pos = BOOTH_COORDS[bid];
    if(!pos) return;
    const s = bid[0];
    const c = MAP_COLORS[s]||'#854F0B', b = MAP_BG[s]||'#FAEEDA';
    hlLayer += '<g>'
      + '<circle cx="'+pos.cx+'" cy="'+pos.cy+'" r="13" fill="'+b+'" stroke="'+c+'" stroke-width="2.5" opacity="0.95"/>'
      + '<text x="'+pos.cx+'" y="'+(pos.cy+1.5)+'" text-anchor="middle" font-size="5.5" fill="'+c+'" font-weight="800" font-family="sans-serif">'+bid+'</text>'
      + '</g>';
  });

  // ── 経路（通路グラフをダイクストラで探索）──
  let routeLayer = '';
  if(fromBooth && BOOTH_COORDS[fromBooth]) {
    const fp = BOOTH_COORDS[fromBooth];

    (highlightIds||[]).forEach(function(bid) {
      if(bid === fromBooth) return;
      const tp = BOOTH_COORDS[bid];
      if(!tp) return;
      const pathD = findCorridorRoute(fp, tp);
      if(pathD) {
        routeLayer += '<path d="'+pathD+'" stroke="#E24B4A" stroke-width="2.5" fill="none" stroke-dasharray="6,3" opacity="0.95" stroke-linejoin="round" stroke-linecap="round"/>';
        routeLayer += '<circle cx="'+tp.cx+'" cy="'+tp.cy+'" r="4" fill="#E24B4A"/>';
      }
    });

    // 現在地マーカー（最前面）
    routeLayer += '<g>'
      + '<circle cx="'+fp.cx+'" cy="'+fp.cy+'" r="16" fill="#185FA5" opacity="0.25"/>'
      + '<circle cx="'+fp.cx+'" cy="'+fp.cy+'" r="11" fill="#185FA5"/>'
      + '<text x="'+fp.cx+'" y="'+(fp.cy+3)+'" text-anchor="middle" font-size="6" fill="#fff" font-weight="700" font-family="sans-serif">現在地</text>'
      + '</g>';
  }

  return '<svg viewBox="0 0 561 734" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;background:#fafaf8">'
    + venueLayer
    + '<g>' + facLayer + '</g>'
    + '<g>' + routeLayer + '</g>'
    + '<g>' + hlLayer + '</g>'
    + '</svg>';
}


function initFuse() {
  if (typeof Fuse === 'undefined') return;
  fuse = new Fuse(P, {
    keys: [
      { name: 'company', weight: 3 },
      { name: 'tags',    weight: 2 },
    ],
    threshold:       0.35,
    includeScore:    true,
    ignoreLocation:  true,
    minMatchCharLength: 2,
  });
}

function search(q, label) {
  showLoading();
  searchCount++;

  const qNorm = q.trim().replace(/[\u3000\s]/g, '').toLowerCase();
  if (!qNorm) { showResults([], label); return; }

  const resultMap = new Map();

  // ── 方式1: 2段階タグ検索（日本語自然文・音声入力対応）──
  const matchedKws = new Set();
  P.forEach(item => {
    (item.tags || []).forEach(tag => {
      const t = tag.trim().toLowerCase();
      if (t.length >= 2 && qNorm.indexOf(t) >= 0) matchedKws.add(t);
    });
  });
  if (qNorm.length >= 2) matchedKws.add(qNorm);

  P.forEach(item => {
    let score = 0;
    const matched = [];
    (item.tags || []).forEach(tag => {
      const t = tag.trim().toLowerCase();
      if (!t || t.length < 2) return;
      for (const kw of matchedKws) {
        if (t.indexOf(kw) >= 0 || kw.indexOf(t) >= 0) {
          score += kw.length;
          if (matched.indexOf(tag) < 0) matched.push(tag);
          break;
        }
      }
    });
    const co = item.company.replace(/[株式会社㈱㈲有限会社]/g, '').toLowerCase();
    if (co.length >= 2 && (qNorm.indexOf(co) >= 0 || co.indexOf(qNorm) >= 0)) {
      score += 20; matched.push(item.company);
    }
    if (score > 0) resultMap.set(item.booth + '|' + item.company, { item, score, matched });
  });

  // ── 方式2: Fuse.js ファジー検索（誤字・略語・英語対応）──
  if (fuse) {
    fuse.search(q, { limit: 20 }).forEach(r => {
      const key = r.item.booth + '|' + r.item.company;
      const fs  = Math.round((1 - (r.score || 0)) * 8);
      if (resultMap.has(key)) {
        resultMap.get(key).score += fs;
      } else if (fs >= 2) {
        resultMap.set(key, { item: r.item, score: fs, matched: [] });
      }
    });
  }

  const top = [...resultMap.values()]
    .sort((a, b) => b.score - a.score)
    .slice(0, 20)
    .map(r => Object.assign({}, r.item, { score: r.score, matchedTags: r.matched }));

  // アンケート用ブース履歴
  top.forEach(r => {
    if (visitedBooths.indexOf(r.booth) < 0) visitedBooths.push(r.booth);
  });

  // ログ記録
  const booths = top.map(r => r.booth).join(',');
  sendLog({ keyword: q, lang: lang, booth: booths, found: top.length > 0 ? 'あり' : 'なし', searchCount: searchCount });

  showResults(top, label);
}


function sendLog(params) {
  const url = GAS_URL + '?action=log'
    + '&keyword=' + encodeURIComponent(params.keyword)
    + '&lang='    + encodeURIComponent(lang)
    + '&booth='   + encodeURIComponent(params.booth)
    + '&found='   + encodeURIComponent(params.found)
    + '&searchCount=' + params.searchCount
    + '&session=' + SESSION_ID;
  fetch(url).catch(() => {});  // エラーは無視
}

// ============================================================
// アンケート（帰り際）
// ============================================================
function showSurvey() {
  let rating = 0;
  const booths = visitedBooths.slice(0, 8);  // 最大8ブース表示

  const boothChecks = booths.map((b, i) => {
    const co = P.find(p => p.booth === b);
    return `<div class="bc" id="bc${i}" onclick="toggleBooth(${i})">
      <span class="bc-num">${b}</span>
      <span class="bc-co">${co ? co.company : b}</span>
    </div>`;
  }).join('');

  document.getElementById('screen').innerHTML = `
  <div class="screen">
    <div class="res-hdr">
      <button class="back-btn" onclick="showHome()"><i class="ti ti-arrow-left"></i></button>
      <div class="res-q">帰り際アンケート</div>
    </div>
    <div class="survey-wrap">
      <div class="survey-title">本日はいかがでしたか？</div>
      <div class="survey-sub">1タップで回答できます</div>
      <div class="rating-row">
        <button class="rating-btn" id="r1" onclick="setRating(1)">😊</button>
        <button class="rating-btn" id="r2" onclick="setRating(2)">😐</button>
        <button class="rating-btn" id="r3" onclick="setRating(3)">😞</button>
      </div>
      ${booths.length ? `
      <div class="survey-q2">良かったブースを教えてください（複数OK）</div>
      <div class="booth-checks" id="boothChecks">${boothChecks}</div>
      ` : ''}
      <button class="submit-btn" onclick="submitSurvey()">送信する</button>
    </div>
  </div>`;

  window._surveyRating = 0;
  window._surveyBooths = [];
}

function setRating(r) {
  window._surveyRating = r;
  [1,2,3].forEach(i => document.getElementById('r'+i).classList.toggle('on', i===r));
}

function toggleBooth(i) {
  const el = document.getElementById('bc'+i);
  const b  = visitedBooths[i];
  if (el.classList.toggle('on')) {
    if (!window._surveyBooths.includes(b)) window._surveyBooths.push(b);
  } else {
    window._surveyBooths = window._surveyBooths.filter(x => x !== b);
  }
}

function submitSurvey() {
  const rating = window._surveyRating || 0;
  const booths = (window._surveyBooths || []).join(',');
  const url = GAS_URL + '?action=survey'
    + '&rating='      + rating
    + '&booths='      + encodeURIComponent(booths)
    + '&searchCount=' + searchCount
    + '&session='     + SESSION_ID;
  fetch(url).catch(() => {});

  document.getElementById('screen').innerHTML = `
  <div class="screen ld-screen">
    <div style="font-size:48px">🎉</div>
    <div class="ld-txt" style="font-size:18px;font-weight:600;color:#1a1a18">ありがとうございました！</div>
    <div class="ld-txt">またのご来場をお待ちしています</div>
  </div>`;
}

// ============================================================
// 言語切替 / 音声入力
// ============================================================
function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  showHome();
}

function toggleMic() {
  const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById('mic');
  if (!SR) return;
  if (listening) {
    recognition && recognition.stop();
    listening = false;
    if (btn) btn.classList.remove('rec');
    return;
  }
  recognition = new SR();
  recognition.lang = lang==='ja'?'ja-JP':lang==='zh'?'zh-CN':lang==='ko'?'ko-KR':'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    listening = false;
    if (btn) btn.classList.remove('rec');
    search(t, t);
  };
  recognition.onerror = recognition.onend = () => {
    listening = false;
    if (btn) btn.classList.remove('rec');
  };
  recognition.start();
  listening = true;
  if (btn) btn.classList.add('rec');
}
</script>
