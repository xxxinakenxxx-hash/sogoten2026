<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>問い合わせ一覧｜総合展2026</title>
  <style>
    :root {
      --green:#0F6E56;
      --bg:#f6f6f3;
      --line:#d9d7ce;
      --text:#1a1a18;
      --muted:#73726c;
      --blue:#185FA5;
      --brown:#854F0B;
      --brownBg:#FAEEDA;
      --red:#C44A2D;
      --orange:#C8842F;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header {
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:16px 22px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      position:sticky;
      top:0;
      z-index:10;
    }
    h1 {
      margin:0;
      font-size:20px;
      line-height:1.3;
    }
    .sub {
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }
    main {
      padding:18px 22px 40px;
      max-width:1600px;
      margin:0 auto;
    }
    .toolbar {
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      display:grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 1fr auto auto;
      gap:10px;
      align-items:end;
      margin-bottom:14px;
    }
    label {
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:5px;
      font-weight:700;
    }
    input, select, textarea {
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 11px;
      font-size:14px;
      background:#fff;
      font-family:inherit;
    }
    textarea {
      resize:vertical;
      min-height:68px;
      line-height:1.5;
    }
    button {
      border:none;
      border-radius:10px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      white-space:nowrap;
      font-family:inherit;
    }
    .btn-main {
      background:var(--green);
      color:#fff;
    }
    .btn-sub {
      background:#e9f4f0;
      color:var(--green);
      border:1px solid #b9d8ce;
    }
    .stats {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .stat {
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      min-width:130px;
    }
    .stat-num {
      font-size:22px;
      font-weight:800;
      color:var(--green);
    }
    .stat-lbl {
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }
    .table-wrap {
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      overflow:auto;
      max-height:calc(100vh - 230px);
    }
    table {
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:1500px;
      font-size:13px;
    }
    th, td {
      border-bottom:1px solid #ecebe6;
      padding:9px 10px;
      vertical-align:top;
      text-align:left;
    }
    th {
      background:#fafaf8;
      color:#444441;
      font-size:12px;
      position:sticky;
      top:0;
      z-index:2;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    tr:hover td {
      background:#fbfffd;
    }
    .booth {
      font-weight:800;
      color:var(--brown);
      background:var(--brownBg);
      border-radius:6px;
      padding:3px 7px;
      display:inline-block;
    }
    .inquiry {
      max-width:360px;
      line-height:1.55;
      white-space:pre-wrap;
    }
    .muted {
      color:var(--muted);
      font-size:12px;
    }
    .pill {
      display:inline-block;
      border-radius:99px;
      padding:3px 8px;
      background:#f0f0ec;
      color:#555;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }
    .pill-visitor { background:#e6f5ee; color:#0F6E56; }
    .pill-staff { background:#e6f0fb; color:#185FA5; }
    .pill-exhibitor { background:#f7eee1; color:#8A5A13; }

    .status-pill {
      display:inline-block;
      border-radius:99px;
      padding:4px 9px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }
    .status-未対応 { background:#FCEBE6; color:#C44A2D; }
    .status-対応中 { background:#E6F0FB; color:#185FA5; }
    .status-対応済み { background:#E6F5EE; color:#0F6E56; }
    .status-保留 { background:#FFF4D8; color:#8A5A13; }

    .status-box {
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:170px;
    }
    .status-row {
      display:flex;
      gap:6px;
      align-items:center;
    }
    .status-select {
      padding:7px 8px;
      font-size:12px;
      border-radius:8px;
    }
    .status-memo {
      font-size:12px;
      padding:7px 8px;
      min-height:44px;
      border-radius:8px;
    }
    .status-save {
      background:var(--green);
      color:#fff;
      padding:7px 9px;
      font-size:12px;
      border-radius:8px;
    }
    .status-updated {
      font-size:11px;
      color:var(--muted);
      line-height:1.3;
    }
    .empty {
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:40px;
      text-align:center;
      color:var(--muted);
    }
    .cards-wrap {
      display:none;
    }
    .inq-card {
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 2px 8px rgba(0,0,0,.03);
    }
    .card-head {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .card-title {
      font-size:15px;
      font-weight:800;
      line-height:1.45;
    }
    .card-date {
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      margin-top:2px;
    }
    .card-section {
      border-top:1px solid #ecebe6;
      padding-top:10px;
      margin-top:10px;
    }
    .card-label {
      font-size:11px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:4px;
    }
    .card-inquiry {
      font-size:14px;
      line-height:1.65;
      white-space:pre-wrap;
      color:#1a1a18;
    }
    .card-grid {
      display:grid;
      grid-template-columns: 72px 1fr;
      gap:6px 10px;
      font-size:13px;
      line-height:1.5;
    }
    .card-k {
      color:var(--muted);
      font-weight:700;
    }
    .card-v {
      color:#1a1a18;
      word-break:break-word;
    }
    .tel-link {
      color:#0F6E56;
      font-weight:800;
      text-decoration:none;
    }

    @media (max-width: 980px) {
      header {
        align-items:flex-start;
        flex-direction:column;
        padding:14px;
      }
      main {
        padding:12px;
      }
      .toolbar {
        grid-template-columns:1fr;
        padding:12px;
        gap:9px;
      }
      .stats {
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
      }
      .stat {
        min-width:0;
        padding:9px 11px;
      }
      .stat-num {
        font-size:20px;
      }
      .table-wrap {
        display:none;
      }
      .cards-wrap {
        display:block;
      }
      button {
        width:100%;
      }
      .card-head {
        flex-direction:column;
      }
      .card-date {
        white-space:normal;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>問い合わせ一覧</h1>
      <div class="sub" id="updatedText">読み込み中...</div>
    </div>
    <div>
      <button class="btn-sub" onclick="loadInquiries()">再読み込み</button>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <div>
        <label>キーワード検索</label>
        <input id="keywordInput" type="search" placeholder="会社名・氏名・メーカー・問い合わせ内容">
      </div>
      <div>
        <label>対応状況</label>
        <select id="statusFilter"></select>
      </div>
      <div>
        <label>拠点別</label>
        <select id="officeFilter"></select>
      </div>
      <div>
        <label>営業担当別</label>
        <select id="personFilter"></select>
      </div>
      <div>
        <label>メーカー別</label>
        <select id="makerFilter"></select>
      </div>
      <div>
        <label>利用区分</label>
        <select id="userTypeFilter"></select>
      </div>
      <button class="btn-main" onclick="downloadCSV()">CSVダウンロード</button>
      <button class="btn-sub" onclick="copyMailText()">メール本文コピー</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="shownCount">0</div>
        <div class="stat-lbl">表示件数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-lbl">総件数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="notDoneCount">0</div>
        <div class="stat-lbl">未対応</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="doingCount">0</div>
        <div class="stat-lbl">対応中</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="doneCount">0</div>
        <div class="stat-lbl">対応済み</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="holdCount">0</div>
        <div class="stat-lbl">保留</div>
      </div>
    </div>

    <div id="tableArea" class="table-wrap"></div>
    <div id="cardsArea" class="cards-wrap"></div>
  </main>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyavH18rQHlhsjPkECUxr9oiyCU0AKhf0aWcG3G53FzF6r1vitTwxDRDULji2iOKU3h/exec';
    const STATUS_OPTIONS = ['未対応', '対応中', '対応済み', '保留'];

    let allItems = [];
    let filteredItems = [];
    let sortKey = 'date';
    let sortDir = 'desc';

    window.addEventListener('load', () => {
      document.getElementById('keywordInput').addEventListener('input', applyFilters);
      document.getElementById('statusFilter').addEventListener('change', applyFilters);
      document.getElementById('officeFilter').addEventListener('change', applyFilters);
      document.getElementById('personFilter').addEventListener('change', applyFilters);
      document.getElementById('makerFilter').addEventListener('change', applyFilters);
      document.getElementById('userTypeFilter').addEventListener('change', applyFilters);
      loadInquiries();
    });

    async function loadInquiries() {
      document.getElementById('updatedText').textContent = '読み込み中...';
      document.getElementById('tableArea').innerHTML = '<div class="empty">読み込み中...</div>';
      document.getElementById('cardsArea').innerHTML = '<div class="empty">読み込み中...</div>';

      try {
        const res = await fetch(GAS_URL + '?action=inquiries&ts=' + Date.now());
        const data = await res.json();

        allItems = Array.isArray(data.items) ? data.items : [];
        allItems.forEach(item => {
          item.status = item.status || '未対応';
          item.statusMemo = item.statusMemo || '';
          item.statusUpdated = item.statusUpdated || '';
        });

        document.getElementById('updatedText').textContent =
          '最終取得：' + (data.updated || '-') + ' / ' + allItems.length + '件';

        buildFilters();
        applyFilters();
      } catch (e) {
        document.getElementById('updatedText').textContent = '取得失敗';
        const msg = '<div class="empty">問い合わせ一覧を取得できませんでした。GASデプロイと権限を確認してください。</div>';
        document.getElementById('tableArea').innerHTML = msg;
        document.getElementById('cardsArea').innerHTML = msg;
      }
    }

    function buildFilters() {
      const offices = uniqueSorted(allItems.map(x => x.salesOffice || '拠点未補完'));
      const persons = uniqueSorted(allItems.map(x => x.salesPerson || '担当未補完'));
      const makers = uniqueSorted(allItems.map(x => x.exhibitor || 'メーカー未入力'));
      const userTypes = uniqueSorted(allItems.map(x => x.userType || '未設定'));

      setOptions('statusFilter', STATUS_OPTIONS, 'すべて');
      setOptions('officeFilter', offices, 'すべて');
      setOptions('personFilter', persons, 'すべて');
      setOptions('makerFilter', makers, 'すべて');
      setOptions('userTypeFilter', userTypes, 'すべて');
    }

    function setOptions(id, values, allLabel) {
      const el = document.getElementById(id);
      const current = el.value;
      el.innerHTML = '<option value="">' + allLabel + '</option>' +
        values.map(v => '<option value="' + escAttr(v) + '">' + esc(v) + '</option>').join('');

      if ([...el.options].some(o => o.value === current)) el.value = current;
    }

    function uniqueSorted(arr) {
      return Array.from(new Set(arr.filter(Boolean))).sort((a,b) => String(a).localeCompare(String(b), 'ja'));
    }

    function applyFilters() {
      const kw = normalize(document.getElementById('keywordInput').value);
      const status = document.getElementById('statusFilter').value;
      const office = document.getElementById('officeFilter').value;
      const person = document.getElementById('personFilter').value;
      const maker = document.getElementById('makerFilter').value;
      const userType = document.getElementById('userTypeFilter').value;

      filteredItems = allItems.filter(item => {
        const itemStatus = item.status || '未対応';
        const itemOffice = item.salesOffice || '拠点未補完';
        const itemPerson = item.salesPerson || '担当未補完';
        const itemMaker = item.exhibitor || 'メーカー未入力';
        const itemUserType = item.userType || '未設定';

        if (status && itemStatus !== status) return false;
        if (office && itemOffice !== office) return false;
        if (person && itemPerson !== person) return false;
        if (maker && itemMaker !== maker) return false;
        if (userType && itemUserType !== userType) return false;

        if (kw) {
          const haystack = normalize([
            item.date,
            item.booth,
            item.exhibitor,
            item.visitorCompany,
            item.visitorName,
            item.visitorDept,
            item.visitorTel,
            item.inquiry,
            item.gyotai,
            item.regtype,
            item.userType,
            item.salesOffice,
            item.salesPerson,
            item.status,
            item.statusMemo
          ].join(' '));

          if (!haystack.includes(kw)) return false;
        }

        return true;
      });

      sortItems();
      renderTable();
      renderCards();
      renderStats();
    }

    function sortItems() {
      filteredItems.sort((a, b) => {
        const av = String(a[sortKey] || '');
        const bv = String(b[sortKey] || '');

        let result = av.localeCompare(bv, 'ja', { numeric: true });
        if (sortDir === 'desc') result *= -1;
        return result;
      });
    }

    function setSort(key) {
      if (sortKey === key) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortKey = key;
        sortDir = key === 'date' ? 'desc' : 'asc';
      }
      applyFilters();
    }

    function sortMark(key) {
      if (sortKey !== key) return '';
      return sortDir === 'asc' ? ' ▲' : ' ▼';
    }

    function renderStats() {
      document.getElementById('shownCount').textContent = filteredItems.length;
      document.getElementById('totalCount').textContent = allItems.length;
      document.getElementById('notDoneCount').textContent = allItems.filter(x => (x.status || '未対応') === '未対応').length;
      document.getElementById('doingCount').textContent = allItems.filter(x => x.status === '対応中').length;
      document.getElementById('doneCount').textContent = allItems.filter(x => x.status === '対応済み').length;
      document.getElementById('holdCount').textContent = allItems.filter(x => x.status === '保留').length;
    }

    function renderTable() {
      if (filteredItems.length === 0) {
        document.getElementById('tableArea').innerHTML =
          '<div class="empty">該当する問い合わせはありません。</div>';
        return;
      }

      const rows = filteredItems.map(item => {
        return `
          <tr>
            <td>${renderStatusEditor(item)}</td>
            <td>${esc(item.date)}</td>
            <td>${item.booth ? '<span class="booth">'+esc(item.booth)+'</span>' : ''}</td>
            <td><strong>${esc(item.exhibitor)}</strong></td>
            <td>
              <strong>${esc(item.visitorCompany)}</strong><br>
              ${esc(item.visitorName)}
              ${item.visitorDept ? '<div class="muted">'+esc(item.visitorDept)+'</div>' : ''}
            </td>
            <td>${esc(item.visitorTel)}</td>
            <td class="inquiry">${esc(item.inquiry)}</td>
            <td>${esc(item.gyotai)}</td>
            <td>${esc(item.salesOffice || '拠点未補完')}</td>
            <td>${esc(item.salesPerson || '担当未補完')}</td>
            <td>${renderUserType(item.userType)}</td>
            <td>${esc(item.regtype)}</td>
            <td><span class="muted">${esc(item.qr)}</span></td>
          </tr>`;
      }).join('');

      document.getElementById('tableArea').innerHTML = `
        <table>
          <thead>
            <tr>
              <th onclick="setSort('status')">対応状況${sortMark('status')}</th>
              <th onclick="setSort('date')">日時${sortMark('date')}</th>
              <th onclick="setSort('booth')">ブース${sortMark('booth')}</th>
              <th onclick="setSort('exhibitor')">メーカー${sortMark('exhibitor')}</th>
              <th onclick="setSort('visitorCompany')">来場者${sortMark('visitorCompany')}</th>
              <th onclick="setSort('visitorTel')">電話${sortMark('visitorTel')}</th>
              <th onclick="setSort('inquiry')">問い合わせ内容${sortMark('inquiry')}</th>
              <th onclick="setSort('gyotai')">業態${sortMark('gyotai')}</th>
              <th onclick="setSort('salesOffice')">拠点${sortMark('salesOffice')}</th>
              <th onclick="setSort('salesPerson')">営業担当${sortMark('salesPerson')}</th>
              <th onclick="setSort('userType')">利用区分${sortMark('userType')}</th>
              <th onclick="setSort('regtype')">登録区分${sortMark('regtype')}</th>
              <th onclick="setSort('qr')">QR${sortMark('qr')}</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderCards() {
      if (filteredItems.length === 0) {
        document.getElementById('cardsArea').innerHTML =
          '<div class="empty">該当する問い合わせはありません。</div>';
        return;
      }

      const html = filteredItems.map(item => {
        const tel = item.visitorTel || '';
        const telHtml = tel
          ? '<a class="tel-link" href="tel:' + escAttr(tel) + '">' + esc(tel) + '</a>'
          : '';

        return `
          <div class="inq-card">
            <div class="card-head">
              <div>
                <div class="card-title">
                  ${item.booth ? '<span class="booth">'+esc(item.booth)+'</span> ' : ''}
                  ${esc(item.exhibitor || 'メーカー未入力')}
                </div>
                <div class="muted">${esc(item.regtype || '')} ${renderUserType(item.userType)}</div>
              </div>
              <div class="card-date">${esc(item.date)}</div>
            </div>

            <div class="card-section">
              <div class="card-label">対応状況</div>
              ${renderStatusEditor(item)}
            </div>

            <div class="card-section">
              <div class="card-label">問い合わせ内容</div>
              <div class="card-inquiry">${esc(item.inquiry)}</div>
            </div>

            <div class="card-section">
              <div class="card-label">来場者</div>
              <div class="card-grid">
                <div class="card-k">会社</div>
                <div class="card-v">${esc(item.visitorCompany)}</div>
                <div class="card-k">氏名</div>
                <div class="card-v">${esc(item.visitorName)}</div>
                <div class="card-k">部署</div>
                <div class="card-v">${esc(item.visitorDept)}</div>
                <div class="card-k">電話</div>
                <div class="card-v">${telHtml}</div>
                <div class="card-k">業態</div>
                <div class="card-v">${esc(item.gyotai)}</div>
              </div>
            </div>

            <div class="card-section">
              <div class="card-label">営業情報</div>
              <div class="card-grid">
                <div class="card-k">拠点</div>
                <div class="card-v">${esc(item.salesOffice || '拠点未補完')}</div>
                <div class="card-k">担当</div>
                <div class="card-v">${esc(item.salesPerson || '担当未補完')}</div>
                <div class="card-k">QR</div>
                <div class="card-v">${esc(item.qr)}</div>
              </div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('cardsArea').innerHTML = html;
    }

    function renderStatusEditor(item) {
      const rowNumber = item.rowNumber;
      const status = item.status || '未対応';
      const memo = item.statusMemo || '';
      const updated = item.statusUpdated || '';

      const opts = STATUS_OPTIONS.map(s =>
        '<option value="' + escAttr(s) + '"' + (s === status ? ' selected' : '') + '>' + esc(s) + '</option>'
      ).join('');

      return `
        <div class="status-box" data-row="${escAttr(rowNumber)}">
          <span class="status-pill status-${escAttr(status)}">${esc(status)}</span>
          <select class="status-select" id="status_${rowNumber}">
            ${opts}
          </select>
          <textarea class="status-memo" id="memo_${rowNumber}" placeholder="対応メモ">${esc(memo)}</textarea>
          <button class="status-save" id="save_${rowNumber}" onclick="saveStatus(${rowNumber})">保存</button>
          ${updated ? '<div class="status-updated">更新: ' + esc(updated) + '</div>' : ''}
        </div>`;
    }

    async function saveStatus(rowNumber) {
      const statusEl = document.getElementById('status_' + rowNumber);
      const memoEl = document.getElementById('memo_' + rowNumber);
      const btn = document.getElementById('save_' + rowNumber);

      if (!statusEl || !memoEl || !btn) return;

      const status = statusEl.value;
      const memo = memoEl.value || '';

      btn.disabled = true;
      btn.textContent = '保存中...';

      try {
        const body = new URLSearchParams();
        body.append('action', 'updateInquiryStatus');
        body.append('rowNumber', rowNumber);
        body.append('status', status);
        body.append('memo', memo);

        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: body.toString()
        });

        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const item = allItems.find(x => String(x.rowNumber) === String(rowNumber));
        if (item) {
          item.status = status;
          item.statusMemo = memo;
          item.statusUpdated = '更新済み';
        }

        btn.textContent = '保存済み';
        setTimeout(() => applyFilters(), 500);
      } catch(e) {
        alert('保存に失敗しました: ' + e.message);
        btn.disabled = false;
        btn.textContent = '保存';
      }
    }

    function renderUserType(type) {
      const t = type || '未設定';
      let cls = 'pill';

      if (t === 'visitor' || t === 'visitor_no_qr') cls += ' pill-visitor';
      else if (t === 'marubishi_staff') cls += ' pill-staff';
      else if (t === 'exhibitor') cls += ' pill-exhibitor';

      return '<span class="' + cls + '">' + esc(t) + '</span>';
    }

    function downloadCSV() {
      const headers = [
        '対応状況',
        '対応メモ',
        '対応日時',
        '日時',
        'ブース',
        'メーカー',
        '来場者会社名',
        '氏名',
        '部署',
        '電話',
        '問い合わせ内容',
        '業態',
        '拠点',
        '営業担当',
        '利用区分',
        '登録区分',
        'QR'
      ];

      const lines = [headers];

      filteredItems.forEach(item => {
        lines.push([
          item.status || '未対応',
          item.statusMemo || '',
          item.statusUpdated || '',
          item.date,
          item.booth,
          item.exhibitor,
          item.visitorCompany,
          item.visitorName,
          item.visitorDept,
          item.visitorTel,
          item.inquiry,
          item.gyotai,
          item.salesOffice || '拠点未補完',
          item.salesPerson || '担当未補完',
          item.userType,
          item.regtype,
          item.qr
        ]);
      });

      const csv = lines.map(row => row.map(csvCell).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'inquiries_' + getDateStamp() + '.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    function copyMailText() {
      if (filteredItems.length === 0) {
        alert('コピー対象がありません');
        return;
      }

      let text = '';
      text += '総合展2026 問い合わせ一覧\n';
      text += '対象件数：' + filteredItems.length + '件\n';
      text += '----------------------------------------\n\n';

      filteredItems.forEach((item, idx) => {
        text += '[' + (idx + 1) + '] ' + (item.booth || '') + ' ' + (item.exhibitor || '') + '\n';
        text += '対応状況：' + (item.status || '未対応') + '\n';
        if (item.statusMemo) text += '対応メモ：' + item.statusMemo + '\n';
        text += '日時：' + (item.date || '') + '\n';
        text += '来場者：' + (item.visitorCompany || '') + ' ' + (item.visitorName || '') + '\n';
        text += '電話：' + (item.visitorTel || '') + '\n';
        text += '拠点：' + (item.salesOffice || '拠点未補完') + '\n';
        text += '営業担当：' + (item.salesPerson || '担当未補完') + '\n';
        text += '問い合わせ内容：\n' + (item.inquiry || '') + '\n';
        text += '\n----------------------------------------\n\n';
      });

      navigator.clipboard.writeText(text).then(() => {
        alert('表示中の問い合わせをメール本文用にコピーしました。');
      }).catch(() => {
        alert('コピーに失敗しました。ブラウザの権限を確認してください。');
      });
    }

    function csvCell(value) {
      const v = String(value || '').replace(/"/g, '""');
      return '"' + v + '"';
    }

    function getDateStamp() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return y + m + day + '_' + h + min;
    }

    function normalize(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/\s+/g, '')
        .replace(/　/g, '');
    }

    function esc(value) {
      return String(value || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function escAttr(value) {
      return esc(value);
    }
  </script>
</body>
</html>
